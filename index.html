<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mixed Taste 🧃</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'neon-pink': '#ff2a6d',
                        'neon-cyan': '#05d9e8',
                        'neon-yellow': '#ffc300',
                        'dark-bg': '#0d0e15',
                        'dark-surface': '#1a1c29',
                    },
                    fontFamily: {
                        'sans': ['"Space Grotesk"', 'system-ui', 'sans-serif'],
                    },
                    animation: {
                        'blob': 'blob 7s infinite',
                        'pulse-fast': 'pulse 1s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'bounce-slow': 'bounce 2s infinite',
                    },
                    keyframes: {
                        blob: {
                            '0%': { transform: 'translate(0px, 0px) scale(1)' },
                            '33%': { transform: 'translate(30px, -50px) scale(1.1)' },
                            '66%': { transform: 'translate(-20px, 20px) scale(0.9)' },
                            '100%': { transform: 'translate(0px, 0px) scale(1)' },
                        }
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">

    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        body { background-color: #0d0e15; color: white; overflow-x: hidden; }
        .glass-panel {
            background: rgba(26, 28, 41, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        audio::-webkit-media-controls-panel { background-color: #1a1c29; }
        audio::-webkit-media-controls-play-button, audio::-webkit-media-controls-mute-button { background-color: #05d9e8; border-radius: 50%; }
        audio::-webkit-media-controls-current-time-display, audio::-webkit-media-controls-time-remaining-display { color: white; }
        
        /* Custom range slider styling */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 20px;
            width: 20px;
            border-radius: 50%;
            background: currentColor;
            cursor: pointer;
            margin-top: -8px;
            box-shadow: 0 0 10px currentColor;
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // --- Firebase Initialization & Rules Setup ---
        const appId = 'mixed-taste-app';
        let db, auth;

        // Charlie's Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyBks1pTTzyDNMwqKPxb0c3oB0d-q9GteHU",
            authDomain: "mixed-taste.firebaseapp.com",
            projectId: "mixed-taste",
            storageBucket: "mixed-taste.firebasestorage.app",
            messagingSenderId: "990603145775",
            appId: "1:990603145775:web:a36b2bb1c979007f540cda",
            measurementId: "G-38VXJQ6VWS"
        };

        firebase.initializeApp(firebaseConfig);
        db = firebase.firestore();
        auth = firebase.auth();

        const getRoomRef = (roomId) => db.collection('rooms').doc(roomId);

        // --- Utility Functions ---
        const generateRoomCode = () => Math.random().toString(36).substring(2, 6).toUpperCase();
        
        const parseWhatsAppLog = (text) => {
            const lines = text.split('\n');
            const messages = [];
            const regex = /^\[(\d{2}\/\d{2}\/\d{4}),\s(\d{2}:\d{2}:\d{2})\]\s([^:]+):\s(.*)$/;
            
            let currentMsg = null;

            for (let line of lines) {
                line = line.trim();
                if (!line) continue;
                if (line.includes('‎') || line.includes('omitted') || line.includes('This message was deleted')) continue; 

                const match = line.match(regex);
                if (match) {
                    if (currentMsg && currentMsg.text.length > 3) messages.push(currentMsg);
                    const sender = match[3].trim();
                    if (sender.includes('added') || sender.includes('changed') || sender.length > 25) continue;

                    currentMsg = { date: match[1], time: match[2], sender: sender, text: match[4].trim() };
                } else if (currentMsg) {
                    currentMsg.text += " " + line;
                }
            }
            if (currentMsg && currentMsg.text.length > 3) messages.push(currentMsg);
            return messages;
        };

        const generateWhatsappQuestions = (messages, numQuestions = 6) => {
            const questions = [];
            const senders = [...new Set(messages.map(m => m.sender))];
            if (senders.length < 2 || messages.length < 20) return null;

            for (let i = 0; i < numQuestions; i++) {
                const type = Math.random() > 0.5 ? 'who_said' : 'fill_blank';
                if (type === 'who_said') {
                    const validMsgs = messages.filter(m => m.text.length > 15);
                    if (validMsgs.length === 0) continue;
                    const msg = validMsgs[Math.floor(Math.random() * validMsgs.length)];
                    let options = new Set([msg.sender]);
                    while(options.size < Math.min(4, senders.length)) {
                        options.add(senders[Math.floor(Math.random() * senders.length)]);
                    }
                    questions.push({ id: `q_${i}`, type: 'who_said', text: `"${msg.text}"`, options: Array.from(options).sort(() => Math.random() - 0.5), correctAnswer: msg.sender });
                } else {
                    const idx = Math.floor(Math.random() * (messages.length - 2));
                    const contextMsg = messages[idx];
                    const targetMsg = messages[idx + 1];

                    let options = new Set([targetMsg.text]);
                    const senderMsgs = messages.filter(m => m.sender === targetMsg.sender && m.text !== targetMsg.text && m.text.length > 3);
                    while(options.size < 4 && senderMsgs.length > options.size) {
                       options.add(senderMsgs[Math.floor(Math.random() * senderMsgs.length)].text);
                    }
                    questions.push({ id: `q_${i}`, type: 'fill_blank', context: `${contextMsg.sender}: "${contextMsg.text}"\n\n${targetMsg.sender}: ...`, options: Array.from(options).sort(() => Math.random() - 0.5), correctAnswer: targetMsg.text });
                }
            }
            return questions;
        };

        const generateEmojiQuestions = (messages, numQuestions = 5) => {
            const emojiStats = {}; 
            const emojiRegex = /\p{Emoji_Presentation}|\p{Extended_Pictographic}/gu;
            
            messages.forEach(m => {
                const emojis = m.text.match(emojiRegex);
                if (emojis) {
                    emojis.forEach(e => {
                        if (!emojiStats[e]) emojiStats[e] = {};
                        emojiStats[e][m.sender] = (emojiStats[e][m.sender] || 0) + 1;
                    });
                }
            });

            const validEmojis = Object.entries(emojiStats)
                .map(([emoji, counts]) => {
                    const sorted = Object.entries(counts).sort((a,b) => b[1] - a[1]);
                    return { emoji, topSender: sorted[0][0], maxCount: sorted[0][1] };
                })
                .filter(e => e.maxCount >= 2) 
                .sort(() => Math.random() - 0.5); 

            const senders = [...new Set(messages.map(m => m.sender))];
            const questions = [];

            for (let i = 0; i < Math.min(numQuestions, validEmojis.length); i++) {
                const target = validEmojis[i];
                let options = new Set([target.topSender]);
                while(options.size < Math.min(4, senders.length)) {
                    options.add(senders[Math.floor(Math.random() * senders.length)]);
                }
                questions.push({ id: `eq_${i}`, emoji: target.emoji, options: Array.from(options).sort(() => Math.random() - 0.5), correctAnswer: target.topSender });
            }
            return questions.length > 0 ? questions : null;
        };

        const generateDerangedAssignments = (uids) => {
            if (uids.length < 2) return null;
            let shuffled, valid = false, attempts = 0;
            while (!valid && attempts < 100) {
                shuffled = [...uids].sort(() => Math.random() - 0.5);
                valid = true;
                for (let i=0; i<uids.length; i++) {
                    if (uids[i] === shuffled[i]) valid = false;
                }
                attempts++;
            }
            if (!valid) return null;
            const assignments = {};
            uids.forEach((uid, i) => assignments[uid] = shuffled[i]);
            return assignments;
        };

        // --- Icons ---
        const Icon = ({ name, size = 24, className = '' }) => {
            const getIcon = () => {
                switch(name) {
                    case 'Music': return <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>;
                    case 'MessageCircle': return <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M7.9 20A9 9 0 1 0 4 16.1L2 22Z"/></svg>;
                    case 'Play': return <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="5 3 19 12 5 21 5 3"/></svg>;
                    case 'Crown': return <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m2 4 3 12h14l3-12-6 7-4-7-4 7-6-7zm3 16h14"/></svg>;
                    case 'ListMusic': return <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 15V6"/><path d="M18.5 18a2.5 2.5 0 1 0 0-5 2.5 2.5 0 0 0 0 5Z"/><path d="M12 12H3"/><path d="M16 6H3"/><path d="M12 18H3"/></svg>;
                    case 'Smile': return <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>;
                    case 'UploadCloud': return <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M4 14.899A7 7 0 1 1 15.71 8h1.79a4.5 4.5 0 0 1 2.5 8.242"/><path d="M12 12v9"/><path d="m16 16-4-4-4 4"/></svg>;
                    case 'Plus': return <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>;
                    case 'Trash2': return <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>;
                    case 'Timer': return <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>;
                    case 'ArrowDown': return <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="12" y1="5" x2="12" y2="19"/><polyline points="19 12 12 19 5 12"/></svg>;
                    case 'Link': return <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>;
                    case 'Settings': return <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>;
                    default: return null;
                }
            };
            return getIcon();
        };

        // --- Common Component: Timer Display ---
        const TimerDisplay = ({ deadline }) => {
            const [timeLeft, setTimeLeft] = React.useState(0);
            
            React.useEffect(() => {
                if (!deadline) return;
                const update = () => setTimeLeft(Math.max(0, Math.floor((deadline - Date.now()) / 1000)));
                update();
                const interval = setInterval(update, 1000);
                return () => clearInterval(interval);
            }, [deadline]);

            if (!deadline || timeLeft <= 0) return null;

            const isUrgent = timeLeft <= 10;

            return (
                <div className={`fixed top-4 md:top-6 left-1/2 -translate-x-1/2 z-[60] glass-panel px-6 py-2 rounded-full border-2 ${isUrgent ? 'border-neon-pink text-neon-pink animate-pulse' : 'border-neon-cyan/50 text-neon-cyan'} font-mono font-bold text-xl md:text-2xl flex items-center gap-2 shadow-lg transition-colors`}>
                    <Icon name="Timer" size={24} /> 00:{timeLeft.toString().padStart(2, '0')}
                </div>
            );
        };

        // --- Core Application ---
        const App = () => {
            const [user, setUser] = React.useState(null);
            const [room, setRoom] = React.useState(null);
            const [playerName, setPlayerName] = React.useState('');
            const [error, setError] = React.useState('');

            React.useEffect(() => {
                if (!auth) {
                    setError("Firebase not initialized. Check console.");
                    return;
                }
                const initAuth = async () => {
                    try {
                        await auth.signInAnonymously();
                    } catch (err) {
                        setError("Failed to connect to game servers.");
                    }
                };
                initAuth();

                const unsubscribe = auth.onAuthStateChanged(u => {
                    setUser(u);
                    const savedName = localStorage.getItem('mixedTasteName');
                    if (savedName) setPlayerName(savedName);
                });
                return () => unsubscribe();
            }, []);

            React.useEffect(() => {
                if (!user || !room?.id) return;
                const unsub = getRoomRef(room.id).onSnapshot(
                    (doc) => {
                        if (doc.exists) {
                            setRoom({ id: doc.id, ...doc.data() });
                        } else {
                            setRoom(null);
                            setError("Room closed by host.");
                        }
                    },
                    (err) => console.error("Room sync error:", err)
                );
                return () => unsub();
            }, [user, room?.id]);

            const handleCreateRoom = async (name) => {
                if (!user) return;
                const roomId = generateRoomCode();
                try {
                    await getRoomRef(roomId).set({
                        host: user.uid,
                        state: 'LOBBY',
                        currentMode: 'song_king', 
                        players: { [user.uid]: { name, score: 0, ready: false } },
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    localStorage.setItem('mixedTasteName', name);
                    setRoom({ id: roomId });
                } catch (err) {
                    setError("Failed to create room.");
                }
            };

            const handleJoinRoom = async (roomId, name) => {
                if (!user) return;
                try {
                    const roomDoc = await getRoomRef(roomId).get();
                    if (!roomDoc.exists) {
                        setError("Room not found.");
                        return;
                    }
                    const data = roomDoc.data();
                    if (data.state !== 'LOBBY') {
                        setError("Game already in progress.");
                        return;
                    }
                    await getRoomRef(roomId).update({
                        [`players.${user.uid}`]: { name, score: 0, ready: false }
                    });
                    localStorage.setItem('mixedTasteName', name);
                    setRoom({ id: roomId });
                } catch (err) {
                    setError("Failed to join room.");
                }
            };

            const leaveRoom = async () => {
                if (room && user) {
                    if (room.host === user.uid) {
                        await getRoomRef(room.id).delete();
                    } else {
                        await getRoomRef(room.id).update({ [`players.${user.uid}`]: firebase.firestore.FieldValue.delete() });
                    }
                }
                setRoom(null);
            };

            if (!user) return <div className="min-h-screen flex items-center justify-center font-sans text-neon-cyan animate-pulse">Connecting to servers...</div>;

            return (
                <div className="min-h-screen relative overflow-x-hidden font-sans">
                    {/* Atmospheric Background */}
                    <div className="absolute top-[-10%] left-[-10%] w-96 h-96 bg-neon-pink rounded-full mix-blend-multiply filter blur-[128px] opacity-20 animate-blob"></div>
                    <div className="absolute top-[20%] right-[-10%] w-96 h-96 bg-neon-cyan rounded-full mix-blend-multiply filter blur-[128px] opacity-20 animate-blob animation-delay-2000"></div>
                    <div className="absolute bottom-[-20%] left-[20%] w-96 h-96 bg-neon-yellow rounded-full mix-blend-multiply filter blur-[128px] opacity-20 animate-blob animation-delay-4000"></div>

                    {/* About Section - Top Right */}
                    <div className="absolute top-4 right-4 md:top-6 md:right-6 z-[40] glass-panel px-4 py-2 rounded-full flex items-center gap-3 shadow-lg border border-gray-700/50 transition-transform hover:scale-105 cursor-default hidden sm:flex">
                        <span className="text-xs md:text-sm font-bold text-gray-300 tracking-wide">Idea by Charlie Blake</span>
                        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSW_C7jBu-wEIBaM8ja0qSmsuUnMpIk5xPstg&s" alt="Charlie Blake" className="w-8 h-8 rounded-full border-2 border-neon-cyan object-cover shadow-[0_0_10px_rgba(5,217,232,0.5)]" />
                    </div>

                    {/* Active Game Timer */}
                    {room && room.state === 'PLAYING' && <TimerDisplay deadline={room.gameData?.deadline} />}

                    <div className="relative z-10 p-4 md:p-8 max-w-5xl mx-auto min-h-screen flex flex-col">
                        {error && (
                            <div className="bg-red-500/20 border border-red-500 text-red-100 p-3 rounded-lg mt-14 md:mt-0 mb-4 flex justify-between items-center z-50 shadow-lg">
                                {error}
                                <button onClick={() => setError('')} className="font-bold hover:text-white transition">✕</button>
                            </div>
                        )}

                        {!room ? (
                            <HomeScreen onCreate={handleCreateRoom} onJoin={handleJoinRoom} defaultName={playerName} />
                        ) : room.state === 'LOBBY' ? (
                            <LobbyScreen room={room} user={user} onLeave={leaveRoom} />
                        ) : (
                            <GameManager room={room} user={user} onLeave={leaveRoom} />
                        )}
                    </div>
                </div>
            );
        };

        // --- Home Screen ---
        const HomeScreen = ({ onCreate, onJoin, defaultName }) => {
            const [name, setName] = React.useState(defaultName);
            const [roomCode, setRoomCode] = React.useState('');

            return (
                <div className="flex-1 flex flex-col items-center justify-center text-center mt-16 md:mt-0 py-8">
                    <div className="mb-8 md:mb-12 relative">
                        <h1 className="text-6xl md:text-8xl font-bold mb-2 tracking-tighter text-transparent bg-clip-text bg-gradient-to-br from-neon-pink via-neon-yellow to-neon-cyan pb-2">Mixed Taste</h1>
                        <p className="text-gray-400 text-lg md:text-xl font-medium tracking-wide">The chaotic friend group party game.</p>
                    </div>

                    <div className="glass-panel p-6 md:p-8 rounded-3xl w-full max-w-md shadow-2xl border border-gray-700/50 mb-8">
                        <div className="mb-6 text-left">
                            <label className="block text-sm font-semibold text-gray-300 mb-2 uppercase tracking-widest">Player Name</label>
                            <input 
                                type="text" 
                                value={name}
                                onChange={(e) => setName(e.target.value)}
                                className="w-full bg-dark-bg/50 border border-gray-600 rounded-xl p-4 text-white focus:border-neon-cyan focus:outline-none focus:ring-2 focus:ring-neon-cyan/20 transition-all text-lg font-medium"
                                placeholder="e.g. DJ Chaos"
                                maxLength="15"
                            />
                        </div>

                        <button 
                            onClick={() => name && onCreate(name)}
                            disabled={!name}
                            className="w-full bg-gradient-to-r from-neon-pink to-pink-600 disabled:opacity-50 text-white font-bold py-4 px-4 rounded-xl transition-transform active:scale-95 flex items-center justify-center gap-2 shadow-lg shadow-neon-pink/20"
                        >
                            <Icon name="Crown" size={20} /> Create New Room
                        </button>

                        <div className="my-8 relative">
                            <div className="absolute inset-0 flex items-center"><div className="w-full border-t border-gray-700"></div></div>
                            <div className="relative flex justify-center"><span className="bg-[#1a1c29] px-4 text-sm text-gray-400 font-bold tracking-widest">OR</span></div>
                        </div>

                        <div className="flex flex-col sm:flex-row gap-3 w-full">
                            <input 
                                type="text" 
                                value={roomCode}
                                onChange={(e) => setRoomCode(e.target.value.toUpperCase())}
                                className="w-full bg-dark-bg/50 border border-gray-600 rounded-xl p-4 text-white uppercase text-center tracking-[0.3em] font-mono focus:border-neon-cyan focus:outline-none text-xl"
                                placeholder="CODE"
                                maxLength="4"
                            />
                            <button 
                                onClick={() => name && roomCode.length === 4 && onJoin(roomCode, name)}
                                disabled={!name || roomCode.length !== 4}
                                className="w-full sm:w-auto bg-neon-cyan hover:bg-cyan-500 disabled:opacity-50 text-black font-bold py-4 px-8 rounded-xl transition-transform active:scale-95 shadow-lg shadow-neon-cyan/20"
                            >
                                Join
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        // --- Lobby Screen ---
        const LobbyScreen = ({ room, user, onLeave }) => {
            const isHost = room.host === user.uid;
            const players = Object.entries(room.players || {});
            
            const [parsingLog, setParsingLog] = React.useState('');

            // Settings State
            const [quizTime, setQuizTime] = React.useState(20);
            const [submitTime, setSubmitTime] = React.useState(60);
            const [guessTime, setGuessTime] = React.useState(60);

            const modes = [
                { id: 'song_king', name: 'Song King', icon: 'Music', desc: 'Secretly submit songs. Guess who picked what.', active: true },
                { id: 'playlist_ring', name: 'Playlist Ring', icon: 'ListMusic', desc: 'Create a prompt. Build a playlist. Cause chaos.', active: true },
                { id: 'whatsapp', name: 'Whatsapp Expozed', icon: 'MessageCircle', desc: 'Upload a chat export. Get quizzed on your chaos.', active: true },
                { id: 'emoji_go', name: 'Emoji Go With Who?', icon: 'Smile', desc: 'Analyzes chat logs to find who uses 💀 the most.', active: true },
                { id: 'chat_chain', name: 'Chat Chain', icon: 'Link', desc: 'Whatsapp Gartic Phone. Turn real texts to emojis and back.', active: true }
            ];

            const setMode = async (modeId) => {
                if (!isHost) return;
                await getRoomRef(room.id).update({ currentMode: modeId });
            };

            const toggleReady = async () => {
                const currentReady = room.players[user.uid]?.ready;
                await getRoomRef(room.id).update({ [`players.${user.uid}.ready`]: !currentReady });
            };

            const handleFileUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                setParsingLog('Analyzing chaos...');
                
                const reader = new FileReader();
                reader.onload = async (e) => {
                    const text = e.target.result;
                    const messages = parseWhatsAppLog(text);
                    
                    if (messages.length < 20) {
                        setParsingLog('❌ Error: Need at least 20 messages in log.');
                        return;
                    }
                    
                    const wpQs = generateWhatsappQuestions(messages, 6);
                    const emQs = generateEmojiQuestions(messages, 6);

                    if (!wpQs && !emQs) {
                        setParsingLog('❌ Error: Not enough varied senders/data.');
                        return;
                    }

                    const validMsgs = messages.filter(m => m.text.length > 10 && m.text.length < 150);
                    const chatMessages = validMsgs.sort(() => Math.random() - 0.5).slice(0, 40);

                    await getRoomRef(room.id).update({
                        'gameData.whatsappQuestions': wpQs || [],
                        'gameData.emojiQuestions': emQs || [],
                        'gameData.chatMessages': chatMessages
                    });
                    setParsingLog(`✅ Success! Loaded data from ${messages.length} messages.`);
                };
                reader.readAsText(file);
            };

            const startGame = async () => {
                if (!isHost) return;
                
                let initialData = {
                    settings: { quizTime, submitTime, guessTime }
                };

                if (room.currentMode === 'song_king') {
                    initialData.phase = 'SUBMIT';
                    initialData.songs = {};
                    initialData.guesses = {};
                    initialData.deadline = Date.now() + (submitTime * 1000);
                } else if (room.currentMode === 'playlist_ring') {
                    initialData.phase = 'PROMPT';
                    initialData.prompts = {};
                    initialData.assignments = {};
                    initialData.playlists = {};
                    initialData.guesses = {};
                    initialData.deadline = Date.now() + (submitTime * 1000);
                } else if (room.currentMode === 'whatsapp') {
                    if (!room.gameData?.whatsappQuestions?.length) {
                        alert("Please upload and parse a WhatsApp log first!");
                        return;
                    }
                    initialData.phase = 'QUESTION';
                    initialData.currentQIndex = 0;
                    initialData.answers = {};
                    initialData.questions = room.gameData.whatsappQuestions;
                    initialData.deadline = Date.now() + (quizTime * 1000);
                } else if (room.currentMode === 'emoji_go') {
                    if (!room.gameData?.emojiQuestions?.length) {
                        alert("Please upload a WhatsApp log with sufficient Emoji usage first!");
                        return;
                    }
                    initialData.phase = 'QUESTION';
                    initialData.currentQIndex = 0;
                    initialData.answers = {};
                    initialData.questions = room.gameData.emojiQuestions;
                    initialData.deadline = Date.now() + (quizTime * 1000);
                } else if (room.currentMode === 'chat_chain') {
                    if (!room.gameData?.chatMessages?.length) {
                        alert("Please upload and parse a WhatsApp log first!");
                        return;
                    }
                    const uids = Object.keys(room.players);
                    const messagesPool = [...room.gameData.chatMessages];
                    const initialAssignments = {};
                    uids.forEach(uid => {
                        initialAssignments[uid] = messagesPool.pop()?.text || "Hello world";
                    });
                    initialData.phase = 'ENCODE';
                    initialData.assignmentsEncode = initialAssignments;
                    initialData.encodeSubmissions = {};
                    initialData.assignmentsDecode = {};
                    initialData.decodeSubmissions = {};
                    initialData.deadline = Date.now() + (submitTime * 1000);
                }

                let updates = { state: 'PLAYING', gameData: initialData };
                Object.keys(room.players).forEach(pId => {
                    updates[`players.${pId}.score`] = 0;
                    updates[`players.${pId}.ready`] = false;
                });

                await getRoomRef(room.id).update(updates);
            };

            return (
                <div className="flex-1 flex flex-col md:flex-row gap-6 h-full mt-14 md:mt-0 pb-8">
                    <div className="w-full md:w-2/3 flex flex-col gap-6 overflow-y-auto hide-scrollbar pb-6">
                        <div className="glass-panel p-6 rounded-3xl flex justify-between items-center shadow-lg">
                            <div>
                                <h2 className="text-sm text-neon-pink font-bold tracking-[0.2em] uppercase mb-1">Room Code</h2>
                                <p className="text-4xl md:text-5xl font-mono tracking-widest font-black text-white drop-shadow-md">{room.id}</p>
                            </div>
                            <button onClick={onLeave} className="text-gray-400 hover:text-white px-4 py-2 rounded-lg border border-gray-600 hover:border-gray-400 hover:bg-gray-800 transition">Leave</button>
                        </div>

                        <div className="glass-panel p-6 rounded-3xl flex-1 shadow-lg">
                            <h2 className="text-2xl font-bold mb-6">Select Mode</h2>
                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                {modes.map(m => (
                                    <div 
                                        key={m.id}
                                        onClick={() => m.active && setMode(m.id)}
                                        className={`p-5 rounded-2xl border-2 transition-all ${!m.active ? 'opacity-50 cursor-not-allowed border-gray-700 bg-gray-800/50' : room.currentMode === m.id ? 'border-neon-cyan bg-cyan-900/20 shadow-[0_0_15px_rgba(5,217,232,0.2)]' : 'border-gray-700 hover:border-gray-500 cursor-pointer'} ${!isHost && m.active ? 'pointer-events-none' : ''}`}
                                    >
                                        <div className="flex items-center gap-3 mb-2">
                                            <Icon name={m.icon} className={room.currentMode === m.id ? 'text-neon-cyan' : 'text-gray-400'} />
                                            <h3 className="font-bold text-lg">{m.name}</h3>
                                        </div>
                                        <p className="text-sm text-gray-400 leading-relaxed">{m.desc}</p>
                                    </div>
                                ))}
                            </div>

                            {(room.currentMode === 'whatsapp' || room.currentMode === 'emoji_go' || room.currentMode === 'chat_chain') && isHost && (
                                <div className="mt-8 p-5 border-2 border-neon-yellow/50 bg-yellow-900/10 rounded-2xl">
                                    <h3 className="font-bold text-neon-yellow mb-2 flex items-center gap-2"><Icon name="UploadCloud" size={20}/> Host: Upload WhatsApp Log</h3>
                                    <p className="text-sm text-gray-300 mb-4 leading-relaxed">Export a WhatsApp chat (Without Media) as a <b>.txt</b> file. Processing is done 100% locally in your browser. Only the generated quiz questions are synced.</p>
                                    <label className="block w-full text-center py-3 px-4 rounded-xl border-2 border-dashed border-gray-600 hover:border-neon-yellow cursor-pointer transition-colors">
                                        <span className="text-neon-yellow font-bold">Choose .txt File</span>
                                        <input type="file" accept=".txt" onChange={handleFileUpload} className="hidden"/>
                                    </label>
                                    {parsingLog && <p className="mt-4 text-sm font-mono bg-dark-bg p-2 rounded text-center">{parsingLog}</p>}
                                </div>
                            )}

                            {isHost && (
                                <div className="mt-8 p-6 border-2 border-gray-700 bg-dark-surface rounded-2xl">
                                    <h3 className="font-bold text-white mb-6 flex items-center gap-2"><Icon name="Settings" size={20}/> Time Limits</h3>
                                    <div className="space-y-6">
                                        <div>
                                            <label className="flex justify-between text-sm font-bold text-gray-400 mb-2">
                                                <span>Quiz Rounds <span className="font-normal text-xs ml-1">(WhatsApp/Emoji)</span></span>
                                                <span className="text-neon-cyan">{quizTime}s</span>
                                            </label>
                                            <input type="range" min="10" max="60" step="5" value={quizTime} onChange={e=>setQuizTime(Number(e.target.value))} className="text-neon-cyan" />
                                        </div>
                                        <div>
                                            <label className="flex justify-between text-sm font-bold text-gray-400 mb-2">
                                                <span>Submit Phase <span className="font-normal text-xs ml-1">(Songs/Prompts/Emojis)</span></span>
                                                <span className="text-neon-pink">{submitTime}s</span>
                                            </label>
                                            <input type="range" min="10" max="120" step="10" value={submitTime} onChange={e=>setSubmitTime(Number(e.target.value))} className="text-neon-pink" />
                                        </div>
                                        <div>
                                            <label className="flex justify-between text-sm font-bold text-gray-400 mb-2">
                                                <span>Guess Phase <span className="font-normal text-xs ml-1">(Playlists/Chains)</span></span>
                                                <span className="text-neon-yellow">{guessTime}s</span>
                                            </label>
                                            <input type="range" min="10" max="120" step="10" value={guessTime} onChange={e=>setGuessTime(Number(e.target.value))} className="text-neon-yellow" />
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>

                    <div className="w-full md:w-1/3 flex flex-col gap-4">
                        <div className="glass-panel p-6 rounded-3xl flex-1 flex flex-col shadow-lg">
                            <h2 className="text-xl font-bold mb-6 flex justify-between items-center">
                                Players <span className="bg-gray-800 text-neon-cyan font-mono px-3 py-1 rounded-full">{players.length}</span>
                            </h2>
                            <div className="flex-1 overflow-y-auto hide-scrollbar space-y-3 mb-6 min-h-[200px]">
                                {players.map(([id, p]) => (
                                    <div key={id} className="flex items-center justify-between bg-dark-surface p-4 rounded-xl border border-gray-700/50 shadow-sm">
                                        <div className="flex items-center gap-3">
                                            <div className="w-10 h-10 rounded-full bg-gradient-to-tr from-neon-pink to-neon-yellow flex items-center justify-center font-bold text-black text-lg shadow-inner">
                                                {p.name.charAt(0).toUpperCase()}
                                            </div>
                                            <span className="font-bold text-lg">{p.name} {id === room.host && '👑'}</span>
                                        </div>
                                        {p.ready ? <span className="text-neon-cyan text-xs font-black tracking-wider bg-cyan-900/30 px-2 py-1 rounded">READY</span> : <span className="text-gray-500 text-xs font-bold tracking-wider">WAITING</span>}
                                    </div>
                                ))}
                            </div>
                            
                            {!isHost ? (
                                <button 
                                    onClick={toggleReady}
                                    className={`w-full py-4 rounded-2xl font-bold text-xl transition-all active:scale-95 shadow-lg ${room.players[user.uid]?.ready ? 'bg-gray-700 text-white shadow-none' : 'bg-neon-cyan text-black hover:bg-cyan-400 shadow-neon-cyan/20'}`}
                                >
                                    {room.players[user.uid]?.ready ? 'Unready' : 'Ready Up!'}
                                </button>
                            ) : (
                                <button 
                                    onClick={startGame}
                                    disabled={players.length < 2}
                                    className="w-full py-4 rounded-2xl font-bold text-xl bg-neon-pink text-white hover:bg-pink-500 transition-all active:scale-95 disabled:opacity-50 disabled:active:scale-100 shadow-lg shadow-neon-pink/20"
                                >
                                    Start Game
                                </button>
                            )}
                            {isHost && players.length < 2 && <p className="text-center text-xs text-red-400 mt-3 font-medium">Requires at least 2 players to start.</p>}
                        </div>
                    </div>
                </div>
            );
        };

        // --- Game Manager Router ---
        const GameManager = ({ room, user, onLeave }) => {
            if (room.currentMode === 'song_king') return <SongKingGame room={room} user={user} onLeave={onLeave} />;
            if (room.currentMode === 'whatsapp') return <QuizGame room={room} user={user} onLeave={onLeave} isEmoji={false} />;
            if (room.currentMode === 'emoji_go') return <QuizGame room={room} user={user} onLeave={onLeave} isEmoji={true} />;
            if (room.currentMode === 'playlist_ring') return <PlaylistRingGame room={room} user={user} onLeave={onLeave} />;
            if (room.currentMode === 'chat_chain') return <ChatChainGame room={room} user={user} onLeave={onLeave} />;
            return <div>Unknown mode</div>;
        };

        // --- Common Component: Results Screen ---
        const ResultsScreen = ({ room }) => {
            const sortedPlayers = Object.entries(room.players).sort((a,b) => b[1].score - a[1].score);
            return (
                <div className="flex-1 flex flex-col items-center justify-center pb-12 mt-16 md:mt-0">
                    <div className="glass-panel p-8 rounded-3xl w-full max-w-md text-center shadow-2xl border border-neon-yellow/30 animate-pulse-fast">
                        <h2 className="text-5xl font-black mb-8 text-transparent bg-clip-text bg-gradient-to-r from-neon-pink to-neon-yellow pb-2">Final Scores</h2>
                        <div className="space-y-4 mb-8">
                            {sortedPlayers.map(([pId, p], idx) => (
                                <div key={pId} className={`flex items-center justify-between p-5 rounded-2xl border ${idx === 0 ? 'bg-yellow-900/20 border-neon-yellow shadow-[0_0_15px_rgba(255,195,0,0.2)]' : 'bg-dark-surface border-gray-700'}`}>
                                    <div className="flex items-center gap-4">
                                        <span className={`text-3xl font-black ${idx === 0 ? 'text-neon-yellow' : 'text-gray-500'}`}>#{idx + 1}</span>
                                        <span className="font-bold text-xl">{p.name}</span>
                                    </div>
                                    <span className={`font-mono font-bold text-2xl ${idx===0 ? 'text-neon-yellow' : 'text-neon-cyan'}`}>{p.score}</span>
                                </div>
                            ))}
                        </div>
                        <p className="text-gray-400 font-bold tracking-widest text-sm">RETURNING TO LOBBY SHORTLY...</p>
                    </div>
                </div>
            );
        };

        // --- Mode 1: Song King ---
        const SongKingGame = ({ room, user, onLeave }) => {
            const isHost = room.host === user.uid;
            const phase = room.gameData?.phase || 'SUBMIT';
            
            const submitTime = room.gameData?.settings?.submitTime || 60;
            const guessTime = room.gameData?.settings?.guessTime || 60;

            const [search, setSearch] = React.useState('');
            const [results, setResults] = React.useState([]);
            const [loading, setLoading] = React.useState(false);
            const [selectedSong, setSelectedSong] = React.useState(null);
            const [myGuesses, setMyGuesses] = React.useState({});

            React.useEffect(() => {
                if (!isHost) return;
                const interval = setInterval(() => {
                    if (!room.gameData || room.gameData.transitioning) return;
                    
                    const currentPhase = room.gameData.phase;
                    const deadline = room.gameData.deadline || 0;
                    const timeUp = deadline > 0 && Date.now() >= deadline;

                    if (currentPhase === 'SUBMIT') {
                        const allSubmitted = Object.keys(room.gameData.songs || {}).length === Object.keys(room.players).length;
                        if (allSubmitted || timeUp) {
                            getRoomRef(room.id).update({ 'gameData.transitioning': true });
                            setTimeout(() => {
                                getRoomRef(room.id).update({
                                    'gameData.phase': 'GUESSING',
                                    'gameData.deadline': Date.now() + (guessTime * 1000),
                                    'gameData.transitioning': false
                                });
                            }, 1500);
                        }
                    } else if (currentPhase === 'GUESSING') {
                        const allGuessed = Object.keys(room.gameData.guesses || {}).length === Object.keys(room.players).length;
                        if (allGuessed || timeUp) {
                            getRoomRef(room.id).update({ 'gameData.transitioning': true });
                            setTimeout(() => revealScores(), 1500);
                        }
                    } else if (currentPhase === 'RESULTS') {
                        if (timeUp) {
                            getRoomRef(room.id).update({ 'gameData.transitioning': true });
                            setTimeout(() => getRoomRef(room.id).update({ state: 'LOBBY', gameData: {} }), 1000);
                        }
                    }
                }, 1000);
                return () => clearInterval(interval);
            }, [room, isHost, guessTime]);

            const searchItunes = async (query) => {
                if (!query) return;
                setLoading(true);
                try {
                    const res = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(query)}&entity=song&limit=5`);
                    const data = await res.json();
                    setResults(data.results);
                } catch (e) { console.error("Search failed", e); }
                setLoading(false);
            };

            const submitSong = async () => {
                if (!selectedSong) return;
                await getRoomRef(room.id).update({
                    [`gameData.songs.${user.uid}`]: {
                        id: selectedSong.trackId, title: selectedSong.trackName, artist: selectedSong.artistName, cover: selectedSong.artworkUrl100, preview: selectedSong.previewUrl
                    }
                });
            };

            const revealScores = async () => {
                let updates = { 'gameData.phase': 'RESULTS', 'gameData.deadline': Date.now() + 15000, 'gameData.transitioning': false };
                Object.keys(room.players).forEach(pId => {
                    let score = room.players[pId].score || 0;
                    const pGuesses = room.gameData.guesses?.[pId] || {};
                    Object.entries(pGuesses).forEach(([songOwnerId, guessedId]) => {
                        if (songOwnerId === guessedId) score += 100;
                    });
                    updates[`players.${pId}.score`] = score;
                });
                await getRoomRef(room.id).update(updates);
            };

            if (phase === 'SUBMIT') {
                const hasSubmitted = !!room.gameData?.songs?.[user.uid];
                return (
                    <div className="flex-1 flex flex-col items-center mt-16 md:mt-0 pb-12">
                        <div className="glass-panel p-8 rounded-3xl w-full max-w-2xl text-center shadow-xl">
                            <h2 className="text-4xl font-bold mb-3 text-neon-pink tracking-tight">Submit a Song</h2>
                            <p className="text-gray-400 mb-8 text-lg">Pick a song you think represents you, or one to fool everyone else.</p>
                            
                            {!hasSubmitted ? (
                                <>
                                    <div className="flex flex-col sm:flex-row gap-2 mb-6 bg-dark-bg p-2 rounded-2xl border border-gray-700">
                                        <input 
                                            type="text" value={search} onChange={(e) => setSearch(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && searchItunes(search)}
                                            placeholder="Search artist or song..."
                                            className="flex-1 bg-transparent border-none p-3 text-white focus:outline-none text-lg text-center sm:text-left"
                                        />
                                        <button onClick={() => searchItunes(search)} className="bg-neon-cyan text-black px-6 py-3 rounded-xl font-bold hover:bg-cyan-400 transition-colors w-full sm:w-auto">Search</button>
                                    </div>
                                    
                                    {loading && <div className="text-neon-cyan animate-pulse py-4 font-bold">Searching the vault...</div>}
                                    
                                    <div className="space-y-3 mb-8 text-left max-h-72 overflow-y-auto hide-scrollbar">
                                        {results.map(track => (
                                            <div key={track.trackId} onClick={() => setSelectedSong(track)} className={`flex items-center gap-4 p-4 rounded-2xl cursor-pointer border-2 transition-all ${selectedSong?.trackId === track.trackId ? 'border-neon-cyan bg-cyan-900/30 scale-[1.02] shadow-lg shadow-cyan-900/20' : 'border-transparent bg-dark-surface hover:bg-gray-800'}`}>
                                                <img src={track.artworkUrl100} className="w-14 h-14 rounded-xl shadow-md" />
                                                <div className="flex-1 overflow-hidden">
                                                    <p className="font-bold truncate text-lg">{track.trackName}</p>
                                                    <p className="text-sm text-gray-400 truncate">{track.artistName}</p>
                                                </div>
                                            </div>
                                        ))}
                                    </div>

                                    <button onClick={submitSong} disabled={!selectedSong} className="w-full bg-neon-pink text-white font-bold py-4 rounded-xl disabled:opacity-50 text-xl transition-transform active:scale-95 shadow-lg shadow-pink-900/50">Lock In Selection</button>
                                </>
                            ) : (
                                <div className="py-16">
                                    <h3 className="text-3xl font-bold mb-4 text-white">Song Locked! 🔒</h3>
                                    <p className="text-gray-400 text-lg mb-8">Waiting for others or the timer...</p>
                                    <div className="flex justify-center gap-3">
                                        {Object.keys(room.players).map(pid => (
                                            <div key={pid} className={`w-4 h-4 rounded-full transition-all duration-500 ${room.gameData?.songs?.[pid] ? 'bg-neon-cyan shadow-[0_0_10px_#05d9e8]' : 'bg-gray-700'}`}></div>
                                        ))}
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                );
            }

            if (phase === 'GUESSING') {
                const songs = Object.entries(room.gameData.songs || {});
                const hasGuessed = !!room.gameData?.guesses?.[user.uid];

                return (
                    <div className="flex-1 flex flex-col h-full mt-16 md:mt-0">
                        <div className="text-center mb-6">
                            <h2 className="text-4xl font-black text-neon-yellow mb-2 tracking-tight">Who picked what?</h2>
                            <p className="text-gray-400 text-lg">Match the players to the tunes.</p>
                        </div>

                        {!hasGuessed ? (
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-5 flex-1 overflow-y-auto hide-scrollbar pb-32 px-2">
                                {songs.map(([ownerId, song]) => (
                                    <div key={ownerId} className="glass-panel p-5 rounded-2xl flex items-center gap-5 border border-gray-700/50 hover:border-neon-cyan/50 transition-colors">
                                        <div className="relative group shrink-0">
                                            <img src={song.cover} className="w-24 h-24 rounded-xl shadow-lg" />
                                            {song.preview && (
                                                <button 
                                                    className="absolute inset-0 bg-black/60 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity rounded-xl"
                                                    onClick={() => { const a = new Audio(song.preview); a.volume = 0.5; a.play(); }}
                                                >
                                                    <Icon name="Play" className="text-white" size={32} />
                                                </button>
                                            )}
                                        </div>
                                        <div className="flex-1 min-w-0">
                                            <p className="font-bold truncate text-xl mb-1">{song.title}</p>
                                            <p className="text-sm text-gray-400 truncate mb-4">{song.artist}</p>
                                            
                                            <select 
                                                className="w-full bg-dark-surface border-2 border-gray-600 rounded-lg p-3 text-white focus:border-neon-cyan focus:outline-none font-bold"
                                                value={myGuesses[ownerId] || ''}
                                                onChange={(e) => setMyGuesses(prev => ({...prev, [ownerId]: e.target.value}))}
                                            >
                                                <option value="" disabled>Select Player...</option>
                                                {Object.entries(room.players).map(([pId, p]) => (
                                                    <option key={pId} value={pId}>{p.name}</option>
                                                ))}
                                            </select>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        ) : (
                            <div className="flex-1 flex items-center justify-center pb-20">
                                <div className="text-center glass-panel p-12 rounded-3xl">
                                    <h3 className="text-3xl font-bold mb-4">Guesses Locked! 🕵️</h3>
                                    <p className="text-gray-400 mb-8 text-lg">Waiting for others or the timer...</p>
                                    <div className="flex justify-center gap-3 mb-8">
                                        {Object.keys(room.players).map(pid => (
                                            <div key={pid} className={`w-4 h-4 rounded-full transition-all duration-500 ${room.gameData?.guesses?.[pid] ? 'bg-neon-pink shadow-[0_0_10px_#ff2a6d]' : 'bg-gray-700'}`}></div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}

                        {!hasGuessed && (
                            <div className="fixed bottom-6 left-0 w-full flex justify-center px-4 pointer-events-none z-50">
                                <button 
                                    onClick={() => getRoomRef(room.id).update({[`gameData.guesses.${user.uid}`]: myGuesses})}
                                    disabled={Object.keys(myGuesses).length !== songs.length}
                                    className="w-full max-w-lg bg-neon-pink text-white font-bold py-4 rounded-2xl shadow-[0_10px_40px_rgba(255,42,109,0.3)] disabled:opacity-0 disabled:-translate-y-4 transition-all duration-300 pointer-events-auto text-xl active:scale-95 hover:bg-pink-500"
                                >
                                    Submit Final Guesses
                                </button>
                            </div>
                        )}
                    </div>
                );
            }

            if (phase === 'RESULTS') return <ResultsScreen room={room} />;
            return null;
        };

        // --- Mode 2 & 4: Whatsapp / Emoji Quiz Game ---
        const QuizGame = ({ room, user, onLeave, isEmoji }) => {
            const isHost = room.host === user.uid;
            const qIndex = room.gameData.currentQIndex || 0;
            const questions = room.gameData.questions || [];
            const currentQ = questions[qIndex];
            const phase = room.gameData.phase;
            
            const quizTime = room.gameData?.settings?.quizTime || 20;

            const hasAnswered = !!room.gameData?.answers?.[qIndex]?.[user.uid];

            React.useEffect(() => {
                if (!isHost) return;
                const interval = setInterval(() => {
                    if (!room.gameData || room.gameData.transitioning) return;
                    
                    const deadline = room.gameData.deadline || 0;
                    const timeUp = deadline > 0 && Date.now() >= deadline;
                    const cIdx = room.gameData.currentQIndex || 0;

                    if (room.gameData.phase === 'QUESTION') {
                        const allAnswered = Object.keys(room.gameData.answers?.[cIdx] || {}).length === Object.keys(room.players).length;
                        if (allAnswered || timeUp) {
                            getRoomRef(room.id).update({ 'gameData.transitioning': true });
                            setTimeout(() => {
                                let updates = {
                                    'gameData.phase': 'REVEAL',
                                    'gameData.deadline': Date.now() + 10000,
                                    'gameData.transitioning': false
                                };
                                const answers = room.gameData.answers?.[cIdx] || {};
                                const curQ = room.gameData.questions[cIdx];
                                Object.entries(answers).forEach(([pId, ans]) => {
                                    if (ans === curQ.correctAnswer) {
                                        updates[`players.${pId}.score`] = (room.players[pId].score || 0) + 100;
                                    }
                                });
                                getRoomRef(room.id).update(updates);
                            }, 1000);
                        }
                    } else if (room.gameData.phase === 'REVEAL') {
                        if (timeUp) {
                            getRoomRef(room.id).update({ 'gameData.transitioning': true });
                            setTimeout(() => {
                                let updates = {};
                                if (cIdx + 1 < room.gameData.questions.length) {
                                    updates['gameData.currentQIndex'] = cIdx + 1;
                                    updates['gameData.phase'] = 'QUESTION';
                                    updates['gameData.deadline'] = Date.now() + (quizTime * 1000);
                                } else {
                                    updates['gameData.phase'] = 'RESULTS';
                                    updates['gameData.deadline'] = Date.now() + 45000;
                                }
                                updates['gameData.transitioning'] = false;
                                getRoomRef(room.id).update(updates);
                            }, 1000);
                        }
                    } else if (room.gameData.phase === 'RESULTS') {
                        if (timeUp) {
                            getRoomRef(room.id).update({ 'gameData.transitioning': true });
                            setTimeout(() => getRoomRef(room.id).update({ state: 'LOBBY', gameData: {} }), 1000);
                        }
                    }
                }, 1000);
                return () => clearInterval(interval);
            }, [room, isHost, quizTime]);

            const submitAnswer = async (answer) => {
                await getRoomRef(room.id).update({ [`gameData.answers.${qIndex}.${user.uid}`]: answer });
            };

            if (!currentQ) return <div className="text-center mt-20 text-xl font-bold animate-pulse">Loading Question...</div>;

            if (phase === 'QUESTION') {
                return (
                    <div className="flex-1 flex flex-col items-center pt-20 md:pt-16 pb-12 overflow-y-auto hide-scrollbar">
                        <div className="w-full max-w-3xl">
                            <div className="flex justify-between items-end mb-6 px-2">
                                <div>
                                    <span className="text-neon-pink font-black text-xl uppercase tracking-widest block mb-1">Round {qIndex + 1}/{questions.length}</span>
                                    <span className="text-gray-400 font-medium">
                                        {isEmoji ? 'Emoji Habits' : (currentQ.type === 'who_said' ? 'Who sent this message?' : 'Fill in the blank context')}
                                    </span>
                                </div>
                            </div>

                            <div className={`glass-panel p-8 md:p-12 rounded-3xl mb-8 shadow-2xl border-l-8 ${isEmoji ? 'border-neon-yellow' : 'border-neon-cyan'} relative overflow-hidden`}>
                                <div className="absolute -right-10 -bottom-10 opacity-5 pointer-events-none">
                                    <Icon name={isEmoji ? 'Smile' : 'MessageCircle'} size={200} />
                                </div>
                                <div className="relative z-10">
                                    {isEmoji ? (
                                        <div className="text-center">
                                            <p className="text-gray-400 uppercase tracking-widest font-bold mb-4">Who uses this emoji the most?</p>
                                            <p className="text-8xl md:text-[120px] filter drop-shadow-lg animate-bounce-slow">{currentQ.emoji}</p>
                                        </div>
                                    ) : currentQ.type === 'who_said' ? (
                                        <p className="text-3xl md:text-4xl font-medium leading-relaxed italic text-white">"{currentQ.text.replace(/"/g, '')}"</p>
                                    ) : (
                                        <div className="space-y-4">
                                            {currentQ.context.split('\n\n').map((line, i) => (
                                                <div key={i} className={`p-4 rounded-2xl ${i === 1 ? 'bg-yellow-900/30 border border-neon-yellow/50' : 'bg-dark-surface'}`}>
                                                    <p className={`text-xl md:text-2xl ${i === 1 ? 'font-bold text-neon-yellow' : 'text-gray-300'}`}>{line}</p>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            </div>

                            {!hasAnswered ? (
                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                    {currentQ.options.map((opt, i) => (
                                        <button 
                                            key={i}
                                            onClick={() => submitAnswer(opt)}
                                            className={`bg-dark-surface hover:bg-gray-800 border-2 border-gray-700 p-6 rounded-2xl text-left font-bold text-xl transition-all active:scale-95 shadow-md hover:shadow-lg ${isEmoji ? 'hover:border-neon-yellow hover:text-neon-yellow' : 'hover:border-neon-cyan hover:text-neon-cyan'}`}
                                        >
                                            {opt}
                                        </button>
                                    ))}
                                </div>
                            ) : (
                                <div className="text-center p-10 bg-dark-surface rounded-3xl border border-gray-700 shadow-xl">
                                    <h3 className="text-2xl font-black mb-2 text-white">Answer Locked 🔒</h3>
                                    <p className="text-gray-400 mb-8 text-lg">Waiting for others or the timer...</p>
                                    <div className="flex justify-center gap-3 mb-8">
                                        {Object.keys(room.players).map(pid => (
                                            <div key={pid} className={`w-4 h-4 rounded-full transition-all duration-500 ${room.gameData?.answers?.[qIndex]?.[pid] ? (isEmoji ? 'bg-neon-yellow shadow-[0_0_10px_#ffc300]' : 'bg-neon-cyan shadow-[0_0_10px_#05d9e8]') : 'bg-gray-700'}`}></div>
                                        ))}
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                );
            }

            if (phase === 'REVEAL') {
                const answers = room.gameData.answers?.[qIndex] || {};
                return (
                    <div className="flex-1 flex flex-col items-center pt-20 md:pt-16 pb-12 overflow-y-auto">
                        <div className="w-full max-w-3xl glass-panel p-8 rounded-3xl text-center shadow-2xl">
                            <h2 className="text-3xl font-black text-neon-cyan mb-6">Round {qIndex + 1} Results</h2>
                            <p className="text-gray-400 mb-2 font-bold uppercase tracking-widest text-sm">The correct answer was:</p>
                            <p className="text-4xl md:text-5xl font-bold text-neon-yellow mb-10 bg-yellow-900/20 p-6 rounded-2xl border border-neon-yellow shadow-inner">"{currentQ.correctAnswer}"</p>
                            
                            <div className="space-y-4 text-left max-w-md mx-auto">
                                {Object.entries(room.players).map(([pId, p]) => {
                                    const pAns = answers[pId];
                                    const isCorrect = pAns === currentQ.correctAnswer;
                                    return (
                                        <div key={pId} className={`p-5 rounded-2xl flex justify-between items-center border-2 ${isCorrect ? 'border-green-500/50 bg-green-900/20 shadow-[0_0_15px_rgba(34,197,94,0.2)]' : 'border-red-500/30 bg-red-900/20'}`}>
                                            <span className="font-bold text-lg text-white">{p.name}</span>
                                            <span className={`italic font-medium ${isCorrect ? 'text-green-400' : 'text-red-400'}`}>{pAns ? `"${pAns}"` : 'Skipped'}</span>
                                        </div>
                                    );
                                })}
                            </div>
                            <p className="mt-10 text-gray-500 animate-pulse text-sm font-bold tracking-widest">NEXT ROUND STARTING SHORTLY...</p>
                        </div>
                    </div>
                );
            }

            if (phase === 'RESULTS') {
                const sortedPlayers = Object.entries(room.players).sort((a,b) => b[1].score - a[1].score);
                return (
                    <div className="flex-1 flex flex-col items-center pt-16 pb-12 overflow-y-auto hide-scrollbar">
                        <div className="w-full max-w-4xl glass-panel p-8 rounded-3xl">
                            <h2 className="text-5xl font-black mb-10 text-center text-transparent bg-clip-text bg-gradient-to-r from-neon-pink to-neon-yellow pb-2">Final Standings</h2>
                            
                            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 mb-14">
                                {sortedPlayers.map(([pId, p], idx) => (
                                    <div key={pId} className={`flex items-center justify-between p-5 rounded-2xl border ${idx === 0 ? 'bg-yellow-900/20 border-neon-yellow shadow-[0_0_15px_rgba(255,195,0,0.2)]' : 'bg-dark-surface border-gray-700'}`}>
                                        <div className="flex items-center gap-3">
                                            <span className={`text-2xl font-black ${idx === 0 ? 'text-neon-yellow' : 'text-gray-500'}`}>#{idx + 1}</span>
                                            <span className="font-bold text-lg text-white truncate max-w-[100px]">{p.name}</span>
                                        </div>
                                        <span className={`font-mono font-bold text-xl ${idx===0 ? 'text-neon-yellow' : 'text-neon-cyan'}`}>{p.score}</span>
                                    </div>
                                ))}
                            </div>

                            <h3 className="text-2xl font-black mb-6 text-neon-cyan border-b-2 border-gray-700 pb-3">Full Game Recap</h3>
                            <div className="space-y-6">
                                {questions.map((q, i) => (
                                    <div key={i} className="bg-dark-surface p-6 rounded-2xl border border-gray-700/50">
                                        <p className="text-sm text-neon-pink font-bold uppercase mb-3 tracking-widest">Round {i + 1}</p>
                                        <p className="text-xl md:text-2xl text-white mb-4 italic">
                                            {isEmoji ? `Who uses ${q.emoji} the most?` : `"${q.text || q.context.split('\n\n').join(' ')}"`}
                                        </p>
                                        <p className="text-lg font-bold text-neon-yellow mb-5 border-l-4 border-neon-yellow pl-3">Answer: {q.correctAnswer}</p>
                                        
                                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-3 text-sm">
                                            {Object.entries(room.players).map(([pId, p]) => {
                                                const pAns = room.gameData.answers?.[i]?.[pId];
                                                const isCorrect = pAns === q.correctAnswer;
                                                return (
                                                    <div key={pId} className={`flex justify-between p-3 rounded-xl border ${isCorrect ? 'border-green-500/30 bg-green-900/20 text-green-400' : 'border-red-500/20 bg-red-900/10 text-red-400'}`}>
                                                        <span className="font-bold text-white truncate max-w-[100px]">{p.name}</span>
                                                        <span className="truncate ml-2">{pAns || 'Skipped'}</span>
                                                    </div>
                                                )
                                            })}
                                        </div>
                                    </div>
                                ))}
                            </div>
                            
                            <div className="mt-12 text-center">
                                <p className="text-gray-400 font-bold tracking-widest text-sm animate-pulse">RETURNING TO LOBBY SHORTLY...</p>
                            </div>
                        </div>
                    </div>
                );
            }
            return null;
        };

        // --- Mode 3: Playlist Ring ---
        const PlaylistRingGame = ({ room, user, onLeave }) => {
            const isHost = room.host === user.uid;
            const phase = room.gameData?.phase || 'PROMPT';
            
            const submitTime = room.gameData?.settings?.submitTime || 60;
            const guessTime = room.gameData?.settings?.guessTime || 60;

            const [promptInput, setPromptInput] = React.useState('');
            const [search, setSearch] = React.useState('');
            const [results, setResults] = React.useState([]);
            const [myPlaylist, setMyPlaylist] = React.useState([]);
            const [myGuesses, setMyGuesses] = React.useState({});

            // Host Automation Loop
            React.useEffect(() => {
                if (!isHost) return;
                const interval = setInterval(() => {
                    if (!room.gameData || room.gameData.transitioning) return;
                    
                    const currentPhase = room.gameData.phase;
                    const deadline = room.gameData.deadline || 0;
                    const timeUp = deadline > 0 && Date.now() >= deadline;

                    if (currentPhase === 'PROMPT') {
                        const allPromptsSubmitted = Object.keys(room.gameData.prompts || {}).length === Object.keys(room.players).length;
                        if (allPromptsSubmitted || timeUp) {
                            getRoomRef(room.id).update({ 'gameData.transitioning': true });
                            setTimeout(() => assignAndMoveToBuild(), 1500);
                        }
                    } else if (currentPhase === 'BUILD') {
                        const allPlaylistsSubmitted = Object.keys(room.gameData.playlists || {}).length === Object.keys(room.players).length;
                        if (allPlaylistsSubmitted || timeUp) {
                            getRoomRef(room.id).update({ 'gameData.transitioning': true });
                            setTimeout(() => {
                                getRoomRef(room.id).update({
                                    'gameData.phase': 'GUESS',
                                    'gameData.deadline': Date.now() + (guessTime * 1000),
                                    'gameData.transitioning': false
                                });
                            }, 1500);
                        }
                    } else if (currentPhase === 'GUESS') {
                        const allGuessed = Object.keys(room.gameData.guesses || {}).length === Object.keys(room.players).length;
                        if (allGuessed || timeUp) {
                            getRoomRef(room.id).update({ 'gameData.transitioning': true });
                            setTimeout(() => revealScores(), 1500);
                        }
                    } else if (currentPhase === 'RESULTS') {
                        if (timeUp) {
                            getRoomRef(room.id).update({ 'gameData.transitioning': true });
                            setTimeout(() => getRoomRef(room.id).update({ state: 'LOBBY', gameData: {} }), 1000);
                        }
                    }
                }, 1000);
                return () => clearInterval(interval);
            }, [room, isHost, guessTime]);

            const submitPrompt = async () => {
                if (!promptInput.trim()) return;
