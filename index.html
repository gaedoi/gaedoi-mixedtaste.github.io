                                {isHost && <button onClick={() => getRoomRef(room.id).update({ state: 'LOBBY', gameData: {} })} className="bg-gray-700 hover:bg-gray-600 px-6 py-3 rounded-xl font-bold text-white shadow-md active:scale-95 transition-transform">Lobby</button>}
                            </div>
                            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 mb-14">
                                {sortedPlayers.map(([pId, p], idx) => (
                                    <div key={pId} className={`flex items-center justify-between p-5 rounded-2xl border ${idx === 0 ? 'bg-[#005c4b]/30 border-[#00a884] shadow-[0_0_15px_rgba(0,168,132,0.3)]' : 'bg-dark-surface border-gray-700'}`}>
                                        <div className="flex items-center gap-3"><span className={`text-2xl font-black ${idx === 0 ? 'text-[#00a884]' : 'text-gray-500'}`}>#{idx + 1}</span><PlayerAvatar player={p} size="10"/><span className="font-bold text-lg text-white truncate max-w-[100px]">{p.name}</span></div>
                                        <span className={`font-mono font-bold text-xl ${idx===0 ? 'text-[#00a884]' : 'text-gray-300'}`}>{p.score}</span>
                                    </div>
                                ))}
                            </div>
                            <h3 className="text-2xl font-black mb-6 text-white border-b-2 border-gray-700 pb-3">Full Game Recap</h3>
                            <div className="space-y-6">
                                {questions.map((q, i) => (
                                    <div key={i} className="bg-wa-bg p-6 rounded-2xl border border-gray-800">
                                        <p className="text-xs text-gray-500 font-bold uppercase mb-2 tracking-widest">Round {i + 1}</p>
                                        <p className="text-xl md:text-2xl text-white mb-4 italic font-medium">{isEmoji ? `Who uses ${q.emoji} the most?` : `"${q.text || q.context.split('\n\n').join(' ')}"`}</p>
                                        <div className="bg-[#005c4b] text-white font-bold p-3 rounded-xl mb-5 w-fit shadow-md border border-[#00a884]/50">Correct: {q.correctAnswer}</div>
                                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3 text-sm">
                                            {Object.entries(room.players).map(([pId, p]) => {
                                                const pAns = room.gameData.answers?.[i]?.[pId];
                                                const isCorrect = pAns === q.correctAnswer;
                                                return (
                                                    <div key={pId} className={`flex justify-between items-center p-3 rounded-xl border ${isCorrect ? 'border-green-500/30 bg-green-900/20 text-green-400' : 'border-red-500/20 bg-red-900/10 text-red-400'}`}>
                                                        <div className="flex items-center gap-2"><PlayerAvatar player={p} size="6"/><span className="font-bold text-white truncate max-w-[80px]">{p.name}</span></div>
                                                        <span className="truncate ml-2 italic">{pAns || 'Skipped'}</span>
                                                    </div>
                                                )
                                            })}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                );
            }
            return null;
        };

        // --- Mode 3: Playlist Ring (Spotify Vibe) ---
        const PlaylistRingGame = ({ room, user }) => {
            const isHost = room.host === user.uid;
            const phase = room.gameData?.phase || 'PROMPT';
            const guessTime = room.gameData?.settings?.guessTime || 60;
            const maciMode = room.gameData?.settings?.maciMode;

            const [promptInput, setPromptInput] = React.useState('');
            const [search, setSearch] = React.useState('');
            const [results, setResults] = React.useState([]);
            const [myPlaylist, setMyPlaylist] = React.useState(room.gameData?.playlists?.[user.uid] || []);
            const [myGuesses, setMyGuesses] = React.useState({});

            const activeAudioRef = React.useRef(null);
            const mixTimeoutRef = React.useRef(null);

            React.useEffect(() => {
                return () => {
                    if (activeAudioRef.current) activeAudioRef.current.pause();
                    if (mixTimeoutRef.current) clearTimeout(mixTimeoutRef.current);
                }
            }, []);

            React.useEffect(() => {
                if (!isHost) return;
                const interval = setInterval(() => {
                    if (!room.gameData || room.gameData.transitioning) return;
                    const forceAdvance = room.gameData.forceAdvance;
                    const timeUp = forceAdvance || (!maciMode && room.gameData.deadline > 0 && Date.now() >= room.gameData.deadline);

                    if (room.gameData.phase === 'PROMPT') {
                        const allPromptsSubmitted = Object.keys(room.gameData.prompts || {}).length === Object.keys(room.players).length;
                        if (allPromptsSubmitted || timeUp) {
                            getRoomRef(room.id).update({ 'gameData.transitioning': true, 'gameData.forceAdvance': false });
                            setTimeout(() => assignAndMoveToBuild(), 1500);
                        }
                    } else if (room.gameData.phase === 'BUILD') {
                        const allPlaylistsSubmitted = Object.keys(room.gameData.lockedIn || {}).length === Object.keys(room.players).length;
                        if (allPlaylistsSubmitted || timeUp) {
                            getRoomRef(room.id).update({ 'gameData.transitioning': true, 'gameData.forceAdvance': false });
                            setTimeout(() => getRoomRef(room.id).update({ 'gameData.phase': 'GUESS', 'gameData.deadline': Date.now() + (guessTime * 1000), 'gameData.transitioning': false }), 1500);
                        }
                    } else if (room.gameData.phase === 'GUESS') {
                        const allGuessed = Object.keys(room.gameData.guesses || {}).length === Object.keys(room.players).length;
                        if (allGuessed || timeUp) {
                            getRoomRef(room.id).update({ 'gameData.transitioning': true, 'gameData.forceAdvance': false });
                            setTimeout(() => revealScores(), 1500);
                        }
                    } else if (room.gameData.phase === 'RESULTS' && (!maciMode && timeUp)) {
                        getRoomRef(room.id).update({ 'gameData.transitioning': true });
                        setTimeout(() => getRoomRef(room.id).update({ state: 'LOBBY', gameData: {} }), 1000);
                    }
                }, 1000);
                return () => clearInterval(interval);
            }, [room, isHost, guessTime, maciMode]);

            const assignAndMoveToBuild = async () => {
                const uids = Object.keys(room.players);
                const assignments = generateDerangedAssignments(uids) || uids.reduce((acc, uid, i) => ({...acc, [uid]: uids[(i+1)%uids.length]}), {});
                const filledPrompts = { ...(room.gameData.prompts || {}) };
                uids.forEach(pid => { if (!filledPrompts[pid]) filledPrompts[pid] = "A mysterious vibe..."; });
                await getRoomRef(room.id).update({ 'gameData.prompts': filledPrompts, 'gameData.assignments': assignments, 'gameData.phase': 'BUILD', 'gameData.deadline': Date.now() + ((room.gameData.settings.submitTime + 30) * 1000), 'gameData.transitioning': false });
            };

            const revealScores = async () => {
                let updates = { 'gameData.phase': 'RESULTS', 'gameData.deadline': Date.now() + 15000, 'gameData.transitioning': false };
                Object.keys(room.players).forEach(pId => {
                    let score = room.players[pId].score || 0;
                    Object.entries(room.gameData.guesses?.[pId] || {}).forEach(([bUid, gUid]) => { if (gUid === room.gameData.assignments[bUid]) score += 100; });
                    updates[`players.${pId}.score`] = score;
                });
                await getRoomRef(room.id).update(updates);
            };

            const playMix = (songs) => {
                if (activeAudioRef.current) activeAudioRef.current.pause();
                if (mixTimeoutRef.current) clearTimeout(mixTimeoutRef.current);
                let i = 0;
                const playNext = () => {
                    if (i >= songs.length) return;
                    const preview = songs[i].preview;
                    if (preview) {
                        const audio = new Audio(preview);
                        audio.volume = 0.5; audio.play();
                        activeAudioRef.current = audio;
                        mixTimeoutRef.current = setTimeout(() => { audio.pause(); i++; playNext(); }, 5000);
                    } else { i++; playNext(); }
                };
                playNext();
            };

            const syncPlaylist = async (newList) => {
                setMyPlaylist(newList);
                await getRoomRef(room.id).update({ [`gameData.playlists.${user.uid}`]: newList });
            };

            if (phase === 'PROMPT') {
                const hasSubmitted = !!room.gameData?.prompts?.[user.uid];
                return (
                    <div className="flex-1 flex flex-col items-center justify-center mt-16 md:mt-0 pb-12 animate-fade-in">
                        <div className="bg-[#121212] p-8 rounded-3xl w-full max-w-lg text-center shadow-2xl border border-gray-800">
                            <h2 className="text-4xl font-black mb-4 text-neon-green">Set the Vibe</h2>
                            <p className="text-gray-400 mb-8 text-lg">Write a prompt or theme. Someone else will build a playlist for it.</p>
                            {!hasSubmitted ? (
                                <>
                                    <textarea value={promptInput} onChange={e=>setPromptInput(e.target.value)} placeholder="e.g., 'Late night drive contemplating life'" className="w-full bg-black border border-gray-800 rounded-xl p-4 text-white focus:border-neon-green focus:outline-none mb-6 h-32 resize-none text-lg" maxLength="60" />
                                    <button onClick={()=>getRoomRef(room.id).update({[`gameData.prompts.${user.uid}`]: promptInput.trim()})} disabled={!promptInput.trim()} className="w-full bg-neon-green text-black font-bold py-4 rounded-full disabled:opacity-50 text-xl hover:brightness-110 shadow-[0_0_15px_rgba(29,185,84,0.3)] transition-transform active:scale-95">Submit Vibe</button>
                                </>
                            ) : (<div><h3 className="text-2xl font-bold mb-4 text-white">Vibe Submitted!</h3><WaitingFor players={room.players} completedIds={Object.keys(room.gameData?.prompts || {})} /></div>)}
                        </div>
                    </div>
                );
            }

            if (phase === 'BUILD') {
                const targetPrompt = room.gameData.prompts?.[room.gameData.assignments?.[user.uid]] || "A mysterious vibe...";
                if (room.gameData?.lockedIn?.[user.uid]) return <div className="flex-1 flex items-center justify-center"><div className="text-center bg-[#121212] border border-gray-800 p-12 rounded-3xl shadow-xl"><h3 className="text-3xl font-bold mb-4 text-white">Playlist Locked! 💿</h3><WaitingFor players={room.players} completedIds={Object.keys(room.gameData?.lockedIn || {})} /></div></div>;

                return (
                    <div className="flex-1 flex flex-col h-full overflow-hidden mt-16 md:mt-0 pb-6 animate-fade-in">
                        <div className="text-center mb-6 shrink-0"><p className="text-neon-cyan font-bold uppercase tracking-widest mb-2">Your Assigned Vibe</p><h2 className="text-2xl md:text-3xl font-black text-white italic px-4">"{targetPrompt}"</h2></div>
                        <div className="flex-1 flex flex-col md:flex-row gap-6 min-h-0">
                            <div className="flex-1 bg-[#121212] p-4 md:p-6 rounded-3xl flex flex-col min-h-[300px] md:min-h-0 border border-gray-800">
                                <div className="flex gap-2 mb-4 bg-black p-2 rounded-xl border border-gray-800 shrink-0">
                                    <input type="text" value={search} onChange={e=>setSearch(e.target.value)} onKeyDown={e=>e.key==='Enter'&&async function(){try{setResults((await(await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(search)}&entity=song&limit=8`)).json()).results)}catch(e){}}()} placeholder="Search songs..." className="flex-1 bg-transparent border-none p-2 text-white focus:outline-none"/>
                                </div>
                                <div className="flex-1 overflow-y-auto hide-scrollbar space-y-2">
                                    {results.map(track => (
                                        <div key={track.trackId} className="flex items-center gap-3 p-3 rounded-xl bg-[#181818] border border-transparent hover:border-gray-600 transition-colors">
                                            <img src={track.artworkUrl100} className="w-10 h-10 rounded-md shadow" />
                                            <div className="flex-1 overflow-hidden"><p className="font-bold truncate text-sm text-white">{track.trackName}</p><p className="text-xs text-gray-400 truncate">{track.artistName}</p></div>
                                            <button onClick={()=> { if(!myPlaylist.find(s=>s.id===track.trackId)) syncPlaylist([...myPlaylist, { id: track.trackId, title: track.trackName, artist: track.artistName, cover: track.artworkUrl100, preview: track.previewUrl }]); }} className="p-2 bg-transparent text-gray-400 hover:text-white hover:scale-110 transition-transform"><Icon name="Plus" size={20}/></button>
                                        </div>
                                    ))}
                                </div>
                            </div>
                            <div className="w-full md:w-1/3 flex flex-col gap-4 shrink-0 md:shrink">
                                <div className="bg-[#121212] p-6 rounded-3xl flex-1 flex flex-col border border-gray-800 shadow-xl relative overflow-hidden">
                                    <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-neon-green to-neon-cyan"></div>
                                    <h3 className="font-bold text-xl mb-4 text-white">Your Mix ({myPlaylist.length} tracks)</h3>
                                    <div className="flex-1 space-y-3 overflow-y-auto max-h-[400px] hide-scrollbar pr-2">
                                        {myPlaylist.map((s, i) => (
                                            <div key={s.id} className="flex items-center gap-3 group">
                                                <span className="text-gray-500 font-mono text-sm w-4">{i+1}</span><img src={s.cover} className="w-10 h-10 rounded shadow-sm" />
                                                <div className="flex-1 overflow-hidden"><p className="font-bold truncate text-sm text-gray-200">{s.title}</p></div>
                                                <button onClick={()=>syncPlaylist(myPlaylist.filter(track=>track.id!==s.id))} className="text-gray-600 hover:text-red-400 transition-colors"><Icon name="Trash2" size={18}/></button>
                                            </div>
                                        ))}
                                    </div>
                                    <button onClick={()=>getRoomRef(room.id).update({ [`gameData.lockedIn.${user.uid}`]: true })} disabled={myPlaylist.length < 3} className="w-full mt-6 bg-neon-green text-black py-4 rounded-full font-bold text-lg hover:brightness-110 disabled:opacity-30 transition-transform active:scale-95 shadow-[0_0_15px_rgba(29,185,84,0.3)]">Lock In Mix</button>
                                    <p className="text-xs text-gray-500 text-center mt-3 font-medium">Min 3 songs required.</p>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            }

            if (phase === 'GUESS') {
                const playlists = Object.entries(room.gameData.playlists || {});
                const promptsList = Object.entries(room.gameData.prompts || {});
                const hasGuessed = !!room.gameData?.guesses?.[user.uid];

                return (
                    <div className="flex-1 flex flex-col h-full pb-20 mt-16 md:mt-0 animate-fade-in">
                        <div className="text-center mb-6 shrink-0"><h2 className="text-3xl font-black text-white mb-2">Whose vibe is this?</h2></div>
                        {!hasGuessed ? (
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6 w-full px-2 pb-10">
                                {playlists.map(([builderId, songs]) => (
                                    <div key={builderId} className="bg-[#121212] p-6 rounded-3xl flex flex-col gap-4 border border-gray-800 shadow-lg hover:border-gray-700 transition-colors">
                                        <div className="flex flex-col gap-2 mb-2 max-h-48 overflow-y-auto hide-scrollbar">
                                            {songs.length > 0 ? songs.map(s => (
                                                <div key={s.id} className="flex items-center gap-3 bg-[#181818] p-2 rounded-xl">
                                                    <img src={s.cover} className="w-12 h-12 rounded-md shadow-md"/>
                                                    <div className="flex-1 overflow-hidden text-left"><p className="font-bold text-sm truncate text-white">{s.title}</p><p className="text-xs text-gray-400 truncate">{s.artist}</p></div>
                                                </div>
                                            )) : <p className="text-gray-600 font-bold italic py-4 text-center">No playlist submitted</p>}
                                        </div>
                                        <button onClick={() => playMix(songs)} className="bg-transparent border border-neon-green text-neon-green py-3 px-4 rounded-full font-bold flex items-center justify-center gap-2 hover:bg-neon-green hover:text-black transition-colors w-full mt-2"><Icon name="Play" size={16} /> Play Mix (5s snippets)</button>
                                        <select className="w-full mt-auto bg-black border border-gray-700 rounded-xl p-3 text-white focus:border-neon-green focus:outline-none font-bold" value={myGuesses[builderId] || ''} onChange={(e) => setMyGuesses(prev => ({...prev, [builderId]: e.target.value}))}>
                                            <option value="" disabled>Guess the Original Vibe...</option>
                                            {promptsList.map(([promptOwnerId, promptText]) => <option key={promptOwnerId} value={promptOwnerId}>"{promptText}"</option>)}
                                        </select>
                                    </div>
                                ))}
                            </div>
                        ) : (<div className="flex-1 flex items-center justify-center"><div className="text-center bg-[#121212] border border-gray-800 p-12 rounded-3xl"><h3 className="text-3xl font-bold mb-4 text-white">Guesses Locked!</h3><WaitingFor players={room.players} completedIds={Object.keys(room.gameData?.guesses || {})} /></div></div>)}
                        {!hasGuessed && (<div className="fixed bottom-6 left-0 w-full flex justify-center px-4 pointer-events-none z-50"><button onClick={() => getRoomRef(room.id).update({[`gameData.guesses.${user.uid}`]: myGuesses})} disabled={Object.keys(myGuesses).length !== playlists.length} className="w-full max-w-lg bg-neon-green text-black font-bold py-4 rounded-full disabled:opacity-0 pointer-events-auto text-xl shadow-[0_10px_40px_rgba(29,185,84,0.3)] transition-transform active:scale-95 hover:brightness-110">Submit Guesses</button></div>)}
                    </div>
                );
            }
            if (phase === 'RESULTS') return <ResultsScreen room={room} isHost={isHost} />;
            return null;
        };

        // --- Mode 5: Chat Chain (WhatsApp Gartic Phone - App Vibe) ---
        const ChatChainGame = ({ room, user }) => {
            const isHost = room.host === user.uid;
            const phase = room.gameData?.phase || 'ENCODE';
            const guessTime = room.gameData?.settings?.guessTime || 60;
            const maciMode = room.gameData?.settings?.maciMode;
            const [encodeInput, setEncodeInput] = React.useState('');
            const [decodeInput, setDecodeInput] = React.useState('');
            const [revealProgress, setRevealProgress] = React.useState(0);

            React.useEffect(() => {
                if (phase !== 'RESULTS') return;
                const timer = setInterval(() => { setRevealProgress(p => p + 1); }, 4000);
                return () => clearInterval(timer);
            }, [phase]);

            React.useEffect(() => {
                if (!isHost) return;
                const interval = setInterval(() => {
                    if (!room.gameData || room.gameData.transitioning) return;
                    const forceAdvance = room.gameData.forceAdvance;
                    const timeUp = forceAdvance || (!maciMode && room.gameData.deadline > 0 && Date.now() >= room.gameData.deadline);

                    if (room.gameData.phase === 'ENCODE') {
                        if (Object.keys(room.gameData.encodeSubmissions || {}).length === Object.keys(room.players).length || timeUp) {
                            getRoomRef(room.id).update({ 'gameData.transitioning': true, 'gameData.forceAdvance': false });
                            setTimeout(async () => {
                                const uids = Object.keys(room.players);
                                const assignments = generateDerangedAssignments(uids) || uids.reduce((acc, uid, i) => ({...acc, [uid]: uids[(i+1)%uids.length]}), {});
                                const filledEncodes = { ...(room.gameData.encodeSubmissions || {}) };
                                uids.forEach(pid => { if (!filledEncodes[pid]) filledEncodes[pid] = "🤷‍♂️🚫"; });
                                await getRoomRef(room.id).update({ 'gameData.encodeSubmissions': filledEncodes, 'gameData.assignmentsDecode': assignments, 'gameData.phase': 'DECODE', 'gameData.deadline': Date.now() + (guessTime * 1000), 'gameData.transitioning': false });
                            }, 1500);
                        }
                    } else if (room.gameData.phase === 'DECODE') {
                        if (Object.keys(room.gameData.decodeSubmissions || {}).length === Object.keys(room.players).length || timeUp) {
                            getRoomRef(room.id).update({ 'gameData.transitioning': true, 'gameData.forceAdvance': false });
                            setTimeout(() => getRoomRef(room.id).update({ 'gameData.phase': 'RESULTS', 'gameData.deadline': Date.now() + ((Object.keys(room.players).length * 12000) + 10000), 'gameData.transitioning': false }), 1500);
                        }
                    } else if (room.gameData.phase === 'RESULTS' && (!maciMode && timeUp)) {
                        getRoomRef(room.id).update({ 'gameData.transitioning': true });
                        setTimeout(() => getRoomRef(room.id).update({ state: 'LOBBY', gameData: {} }), 1000);
                    }
                }, 1000);
                return () => clearInterval(interval);
            }, [room, isHost, guessTime, maciMode]);

            if (phase === 'ENCODE') {
                const targetPrompt = room.gameData.assignmentsEncode?.[user.uid] || "Loading...";
                const hasSubmitted = !!room.gameData?.encodeSubmissions?.[user.uid];
                return (
                    <div className="flex-1 flex flex-col items-center justify-center mt-16 md:mt-0 pb-12 animate-fade-in">
                        <div className="bg-wa-bg p-8 rounded-3xl w-full max-w-2xl text-center shadow-2xl border border-gray-800">
                            <h2 className="text-4xl font-black mb-4 text-white">Translate to Emojis</h2>
                            <p className="text-gray-400 mb-8 text-lg">Someone actually sent this in your group chat. Rewrite it using ONLY emojis!</p>
                            <div className="bg-wa-recv p-6 rounded-2xl rounded-tl-none chat-bubble chat-bubble-recv w-fit mx-auto mb-8 shadow-md">
                                <p className="text-2xl md:text-3xl font-medium text-gray-100">"{targetPrompt}"</p>
                            </div>
                            {!hasSubmitted ? (
                                <>
                                    <input type="text" value={encodeInput} onChange={e=>setEncodeInput(e.target.value)} placeholder="e.g., 🚗💨😱" className="w-full bg-[#2a3942] border border-[#202c33] rounded-xl p-6 text-4xl text-center text-white focus:border-[#00a884] focus:outline-none mb-6 tracking-widest shadow-inner" maxLength="30"/>
                                    <button onClick={()=>getRoomRef(room.id).update({ [`gameData.encodeSubmissions.${user.uid}`]: encodeInput.trim() })} disabled={!encodeInput.trim()} className="w-full bg-[#00a884] text-white font-bold py-4 rounded-xl disabled:opacity-50 text-xl hover:bg-[#00c298] transition-colors shadow-md active:scale-95">Send Emojis</button>
                                </>
                            ) : (<div><h3 className="text-2xl font-bold mb-4 text-white">Sent! 🔒</h3><WaitingFor players={room.players} completedIds={Object.keys(room.gameData?.encodeSubmissions || {})} /></div>)}
                        </div>
                    </div>
                );
            }

            if (phase === 'DECODE') {
                const emojisToDecode = room.gameData.encodeSubmissions?.[room.gameData.assignmentsDecode?.[user.uid]] || "🤷‍♂️";
                const hasSubmitted = !!room.gameData?.decodeSubmissions?.[user.uid];
                return (
                    <div className="flex-1 flex flex-col items-center justify-center mt-16 md:mt-0 pb-12 animate-fade-in">
                        <div className="bg-wa-bg p-8 rounded-3xl w-full max-w-2xl text-center shadow-2xl border border-gray-800">
                            <h2 className="text-4xl font-black mb-4 text-white">Translate to Text</h2>
                            <p className="text-gray-400 mb-8 text-lg">Someone translated a real chat message into these emojis. What did the original text say?</p>
                            <div className="bg-wa-sent p-8 rounded-2xl rounded-tr-none chat-bubble chat-bubble-sent w-fit mx-auto mb-8 shadow-md">
                                <p className="text-6xl md:text-7xl filter drop-shadow-sm">{emojisToDecode}</p>
                            </div>
                            {!hasSubmitted ? (
                                <>
                                    <textarea value={decodeInput} onChange={e=>setDecodeInput(e.target.value)} placeholder="What do these emojis mean...?" className="w-full bg-[#2a3942] border border-[#202c33] rounded-xl p-4 text-white focus:border-[#00a884] focus:outline-none mb-6 h-28 resize-none text-xl text-center shadow-inner" maxLength="100"/>
                                    <button onClick={()=>getRoomRef(room.id).update({ [`gameData.decodeSubmissions.${user.uid}`]: decodeInput.trim() })} disabled={!decodeInput.trim()} className="w-full bg-[#00a884] text-white font-bold py-4 rounded-xl disabled:opacity-50 text-xl hover:bg-[#00c298] transition-colors shadow-md active:scale-95">Send Guess</button>
                                </>
                            ) : (<div><h3 className="text-2xl font-bold mb-4 text-white">Sent! 🔒</h3><WaitingFor players={room.players} completedIds={Object.keys(room.gameData?.decodeSubmissions || {})} /></div>)}
                        </div>
                    </div>
                );
            }

            if (phase === 'RESULTS') {
                const uids = Object.keys(room.players);
                const chainIdx = Math.floor(revealProgress / 3);
                const step = revealProgress % 3;

                if (chainIdx >= uids.length) return <ResultsScreen room={room} isHost={isHost} />;

                const originalUid = uids[chainIdx];
                const originalMessage = room.gameData.assignmentsEncode[originalUid];
                const emojis = room.gameData.encodeSubmissions[originalUid];
                const decoderUid = Object.keys(room.gameData.assignmentsDecode || {}).find(uid => room.gameData.assignmentsDecode[uid] === originalUid);
                const finalGuess = room.gameData.decodeSubmissions?.[decoderUid] || "No guess submitted...";

                return (
                    <div className="flex-1 flex flex-col h-full mt-16 md:mt-0 pb-12 items-center justify-center">
                        <div className="bg-wa-bg p-8 rounded-3xl w-full max-w-2xl text-center shadow-2xl border border-gray-800">
                            <h2 className="text-3xl font-black mb-8 text-[#00a884] border-b border-gray-800 pb-4">Chain {chainIdx + 1} of {uids.length}</h2>
                            <div className="space-y-6 flex flex-col items-center w-full">
                                <div className="chat-bubble chat-bubble-recv bg-wa-recv p-5 rounded-2xl rounded-tl-none self-start w-fit max-w-[85%] text-left animate-slide-up shadow">
                                    <span className="text-gray-400 text-xs font-bold uppercase mb-1 block">Original ({room.players[originalUid]?.name})</span>
                                    <p className="text-xl md:text-2xl font-medium text-gray-200">"{originalMessage}"</p>
                                </div>
                                {step >= 1 && (
                                    <div className="chat-bubble chat-bubble-sent bg-[#005c4b]/80 border border-[#00a884]/30 p-5 rounded-2xl rounded-tr-none self-end w-fit max-w-[85%] text-right animate-slide-up shadow">
                                        <span className="text-green-200 text-xs font-bold uppercase mb-1 block">Translation ({room.players[originalUid]?.name})</span>
                                        <p className="text-4xl md:text-5xl tracking-widest drop-shadow-sm">{emojis}</p>
                                    </div>
                                )}
                                {step >= 2 && (
                                    <div className="chat-bubble chat-bubble-recv bg-wa-recv p-5 rounded-2xl rounded-tl-none self-start w-fit max-w-[85%] text-left animate-slide-up shadow border border-gray-600">
                                        <span className="text-gray-400 text-xs font-bold uppercase mb-1 block">Final Guess ({room.players[decoderUid]?.name})</span>
                                        <p className="text-2xl font-bold text-white">"{finalGuess}"</p>
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                );
            }
            return null;
        };

        // --- Mode 7: Google It! (Dark Mode Search Theme) ---
        const GoogleItGame = ({ room, user }) => {
            const isHost = room.host === user.uid;
            const phase = room.gameData?.phase || 'PROMPT';
            const googlerId = room.gameData?.googler;
            const submitTime = room.gameData?.settings?.submitTime || 60;
            const maciMode = room.gameData?.settings?.maciMode;
            
            const [promptInput, setPromptInput] = React.useState('');
            const [answerInput, setAnswerInput] = React.useState('');

            React.useEffect(() => {
                if (!isHost) return;
                const interval = setInterval(() => {
                    if (!room.gameData || room.gameData.transitioning) return;
                    const forceAdvance = room.gameData.forceAdvance;
                    const timeUp = forceAdvance || (!maciMode && room.gameData.deadline > 0 && Date.now() >= room.gameData.deadline);

                    if (room.gameData.phase === 'PROMPT') {
                        if (room.gameData.prompt || timeUp) {
                            getRoomRef(room.id).update({ 'gameData.transitioning': true, 'gameData.forceAdvance': false });
                            if (!room.gameData.prompt) getRoomRef(room.id).update({ 'gameData.prompt': 'Why is my friend group so weird?' });
                            setTimeout(() => getRoomRef(room.id).update({ 'gameData.phase': 'ANSWER', 'gameData.deadline': Date.now() + (submitTime * 1000), 'gameData.transitioning': false }), 1000);
                        }
                    } else if (room.gameData.phase === 'ANSWER') {
                        if (Object.keys(room.gameData.answers || {}).length === Object.keys(room.players).length || timeUp) {
                            getRoomRef(room.id).update({ 'gameData.transitioning': true, 'gameData.forceAdvance': false });
                            setTimeout(() => getRoomRef(room.id).update({ 'gameData.phase': 'VOTE', 'gameData.deadline': Date.now() + ((room.gameData.settings?.guessTime || 60) * 1000), 'gameData.transitioning': false }), 1000);
                        }
                    } else if (room.gameData.phase === 'VOTE') {
                        if (Object.keys(room.gameData.votes || {}).length === Object.keys(room.players).length || timeUp) {
                            getRoomRef(room.id).update({ 'gameData.transitioning': true, 'gameData.forceAdvance': false });
                            setTimeout(() => {
                                let updates = { 'gameData.phase': 'REVEAL', 'gameData.currentSlide': 0, 'gameData.transitioning': false };
                                Object.keys(room.players).forEach(pId => {
                                    let score = room.players[pId].score || 0;
                                    Object.values(room.gameData.votes || {}).forEach(v => { if (v === pId) score += 100; });
                                    updates[`players.${pId}.score`] = score;
                                });
                                getRoomRef(room.id).update(updates);
                            }, 1000);
                        }
                    } else if (room.gameData.phase === 'RESULTS' && (!maciMode && timeUp)) {
                        getRoomRef(room.id).update({ 'gameData.transitioning': true });
                        setTimeout(() => getRoomRef(room.id).update({ state: 'LOBBY', gameData: {} }), 1000);
                    }
                }, 1000);
                return () => clearInterval(interval);
            }, [room, isHost, submitTime, maciMode]);

            if (phase === 'PROMPT') {
                if (user.uid === googlerId) {
                    return (
                        <div className="flex-1 flex items-center justify-center">
                            <div className="bg-google-bg p-10 rounded-3xl w-full max-w-2xl text-center shadow-2xl animate-fade-in border border-gray-700">
                                <h2 className="text-5xl font-sans font-medium mb-8 tracking-tight">
                                    <span className="text-blue-500">M</span><span class="text-red-500">i</span><span class="text-yellow-500">x</span><span class="text-blue-500">e</span><span class="text-green-500">d</span><span class="text-gray-200"> Search</span>
                                </h2>
                                <div className="bg-google-search rounded-full flex items-center px-6 py-4 mb-8 shadow border border-gray-600 focus-within:bg-gray-800 transition-colors">
                                    <Icon name="Search" className="text-gray-400 mr-3" />
                                    <input type="text" value={promptInput} onChange={e=>setPromptInput(e.target.value)} placeholder="Search Google or type a URL" className="bg-transparent border-none text-white w-full focus:outline-none text-xl" maxLength="80"/>
                                </div>
                                <button onClick={() => getRoomRef(room.id).update({ 'gameData.prompt': promptInput.trim() || "Why is my friend group so weird?" })} className="bg-[#303134] text-gray-200 border border-gray-600 font-medium py-3 px-8 rounded hover:border-gray-400 transition-colors">Google Search</button>
                            </div>
                        </div>
                    );
                } else {
                    return (<div className="flex-1 flex items-center justify-center"><div className="text-center bg-google-bg p-12 rounded-3xl border border-gray-700 animate-pulse"><Icon name="Search" size={48} className="text-blue-500 mx-auto mb-4 animate-bounce-slow" /><h3 className="text-3xl font-medium mb-2 text-gray-200">Waiting for {room.players[googlerId]?.name} to search...</h3></div></div>);
                }
            }

            if (phase === 'ANSWER') {
                if (room.gameData?.answers?.[user.uid]) return <div className="flex-1 flex items-center justify-center"><div className="bg-google-bg p-12 rounded-3xl border border-gray-700"><h3 className="text-3xl font-medium text-gray-200 mb-4">Answer Locked!</h3><WaitingFor players={room.players} completedIds={Object.keys(room.gameData?.answers || {})} /></div></div>;
                return (
                    <div className="flex-1 flex items-center justify-center pb-12 mt-16 md:mt-0">
                        <div className="bg-google-bg p-8 md:p-12 rounded-3xl w-full max-w-3xl shadow-2xl border border-gray-700 animate-fade-in">
                            <div className="flex items-center gap-3 border-b border-gray-700 pb-4 mb-8">
                                <Icon name="Search" className="text-gray-400" />
                                <p className="text-2xl font-medium text-white">{room.gameData.prompt}</p>
                            </div>
                            <textarea value={answerInput} onChange={e=>setAnswerInput(e.target.value)} placeholder="Write the best search result..." className="w-full bg-google-search border border-gray-600 rounded-xl p-6 text-white focus:border-blue-500 focus:outline-none mb-6 h-32 resize-none text-lg shadow-inner" maxLength="100"/>
                            <button onClick={() => getRoomRef(room.id).update({ [`gameData.answers.${user.uid}`]: answerInput.trim() || 'Nothing' })} disabled={!answerInput.trim()} className="w-full bg-blue-600 text-white font-medium py-4 rounded-xl disabled:opacity-50 text-xl hover:bg-blue-500 transition-colors shadow">Submit Result</button>
                        </div>
                    </div>
                );
            }

            if (phase === 'VOTE') {
                const answers = Object.entries(room.gameData.answers || {}).sort((a,b) => a[0].localeCompare(b[0]));
                if (room.gameData?.votes?.[user.uid]) return <div className="flex-1 flex items-center justify-center"><div className="bg-google-bg p-12 rounded-3xl border border-gray-700"><h3 className="text-3xl font-medium text-gray-200 mb-4">Vote Locked!</h3><WaitingFor players={room.players} completedIds={Object.keys(room.gameData?.votes || {})} /></div></div>;
                return (
                    <div className="flex-1 flex flex-col h-full mt-16 md:mt-0 bg-google-bg rounded-3xl p-6 border border-gray-700">
                        <div className="border-b border-gray-700 pb-6 mb-6 shrink-0 flex items-center gap-4">
                            <h2 className="text-3xl font-sans font-medium tracking-tight">
                                <span className="text-blue-500">M</span><span class="text-red-500">i</span><span class="text-yellow-500">x</span><span class="text-blue-500">e</span><span class="text-green-500">d</span>
                            </h2>
                            <div className="bg-google-search rounded-full px-5 py-2 flex items-center flex-1 max-w-xl border border-gray-600">
                                <span className="text-white text-lg truncate">{room.gameData.prompt}</span>
                            </div>
                        </div>
                        <p className="text-gray-400 text-sm mb-4 shrink-0">About {answers.length} results (0.32 seconds). Vote for the best one.</p>
                        <div className="w-full space-y-6 pb-10">
                            {answers.map(([ansUid, text]) => (
                                <div key={ansUid} className={`p-4 rounded-xl transition-colors ${ansUid === user.uid ? 'opacity-50 cursor-not-allowed' : 'hover:bg-gray-800 cursor-pointer'}`} onClick={() => ansUid !== user.uid && getRoomRef(room.id).update({ [`gameData.votes.${user.uid}`]: ansUid })}>
                                    <p className="text-sm text-gray-400 mb-1">https://mixed.search › result</p>
                                    <h3 className="text-xl text-google-link font-medium mb-1 underline hover:text-blue-300">{text.length > 50 ? text.substring(0,50) + '...' : text}</h3>
                                    <p className="text-gray-300 text-sm">{text}</p>
                                </div>
                            ))}
                        </div>
                    </div>
                );
            }

            if (phase === 'REVEAL') {
                const answersArr = Object.entries(room.gameData.answers || {});
                if (answersArr.length === 0) return <div className="flex-1 flex items-center justify-center"><h2 className="text-3xl font-bold text-gray-400">No one answered!</h2>{isHost && <button onClick={() => getRoomRef(room.id).update({ 'gameData.phase': 'RESULTS' })} className="mt-6 bg-blue-600 px-6 py-2 rounded text-white font-bold">Skip</button>}</div>;

                const votesCount = {};
                Object.values(room.gameData.votes || {}).forEach(v => { votesCount[v] = (votesCount[v]||0) + 1; });
                answersArr.sort((a,b) => (votesCount[a[0]]||0) - (votesCount[b[0]]||0));

                const currentSlideIndex = room.gameData.currentSlide || 0;
                const currentAnswer = answersArr[currentSlideIndex];
                const isWinner = currentSlideIndex === answersArr.length - 1;

                return (
                    <div className="flex-1 flex flex-col items-center justify-center pb-12 mt-16 md:mt-0 relative">
                        {isWinner && <div className="absolute inset-0 bg-yellow-500/10 animate-pulse rounded-[3rem] filter blur-3xl pointer-events-none"></div>}
                        <div key={currentSlideIndex} className={`w-full max-w-4xl text-center z-10 animate-slide-up`}>
                            <p className="text-xl font-medium text-gray-400 mb-4 tracking-widest uppercase">{isWinner ? 'Top Result' : 'Search Result'}</p>
                            <div className={`p-10 md:p-16 rounded-3xl shadow-2xl mb-8 border transition-all ${isWinner ? 'bg-google-bg border-yellow-500 shadow-[0_0_40px_rgba(234,179,8,0.2)]' : 'bg-google-bg border-gray-700'}`}>
                                <p className="text-sm text-gray-400 mb-2 text-left">https://mixed.search › best-answer</p>
                                <p className={`font-medium text-left leading-tight ${isWinner ? 'text-4xl md:text-6xl text-google-link underline' : 'text-3xl md:text-4xl text-google-link'}`}>{currentAnswer[1]}</p>
                            </div>
                            <div className="flex flex-col md:flex-row justify-center items-center gap-4 md:gap-12">
                                <div className="flex items-center gap-3 bg-dark-bg px-6 py-3 rounded-full border border-gray-700">
                                    <PlayerAvatar player={room.players[currentAnswer[0]]} size="10" />
                                    <span className="text-2xl font-bold text-gray-200">{room.players[currentAnswer[0]]?.name}</span>
                                </div>
                                <p className="text-2xl font-bold text-gray-400 bg-dark-bg px-6 py-3 rounded-full border border-gray-700"><span className={isWinner ? 'text-yellow-500' : 'text-white'}>{votesCount[currentAnswer[0]] || 0}</span> Votes</p>
                            </div>
                        </div>
                        {isHost && (
                            <div className="fixed bottom-6 left-0 w-full flex justify-center px-4 z-50">
                                <button onClick={() => isWinner ? getRoomRef(room.id).update({ 'gameData.phase': 'RESULTS' }) : getRoomRef(room.id).update({ 'gameData.currentSlide': currentSlideIndex + 1 })} className={`w-full max-w-md text-white font-medium py-4 rounded-full text-xl shadow-lg transition-transform active:scale-95 ${isWinner ? 'bg-blue-600 hover:bg-blue-500' : 'bg-gray-700 hover:bg-gray-600'}`}>
                                    {isWinner ? 'Show Standings' : 'Next Answer'}
                                </button>
                            </div>
                        )}
                        {!isHost && <p className="fixed bottom-10 text-gray-500 font-bold tracking-widest text-sm uppercase animate-pulse">Waiting for host...</p>}
                    </div>
                );
            }
            if (phase === 'RESULTS') return <ResultsScreen room={room} isHost={isHost} />;
            return null;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
