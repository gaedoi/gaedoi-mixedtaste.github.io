                await getRoomRef(room.id).update({ [`gameData.prompts.${user.uid}`]: promptInput.trim() });
            };

            const assignAndMoveToBuild = async () => {
                const uids = Object.keys(room.players);
                const assignments = generateDerangedAssignments(uids);
                if (!assignments) { 
                    alert("Shuffle failed. Returning to lobby."); 
                    getRoomRef(room.id).update({ state: 'LOBBY', gameData: {} });
                    return; 
                }
                
                const currentPrompts = room.gameData.prompts || {};
                const filledPrompts = { ...currentPrompts };
                uids.forEach(pid => {
                    if (!filledPrompts[pid]) filledPrompts[pid] = "A mysterious, silent vibe...";
                });

                await getRoomRef(room.id).update({ 
                    'gameData.prompts': filledPrompts,
                    'gameData.assignments': assignments, 
                    'gameData.phase': 'BUILD',
                    'gameData.deadline': Date.now() + ((guessTime + 30) * 1000), // extra 30s to build
                    'gameData.transitioning': false
                });
            };

            const searchItunes = async (query) => {
                if (!query) return;
                try {
                    const res = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(query)}&entity=song&limit=8`);
                    const data = await res.json();
                    setResults(data.results);
                } catch (e) { console.error("Search failed", e); }
            };

            const addSong = (track) => {
                if (!myPlaylist.find(s => s.id === track.trackId)) {
                    setMyPlaylist([...myPlaylist, { id: track.trackId, title: track.trackName, artist: track.artistName, cover: track.artworkUrl100 }]);
                }
            };
            const removeSong = (id) => setMyPlaylist(myPlaylist.filter(s => s.id !== id));

            const submitPlaylist = async () => {
                if (myPlaylist.length < 3) return;
                await getRoomRef(room.id).update({ [`gameData.playlists.${user.uid}`]: myPlaylist });
            };

            const revealScores = async () => {
                let updates = { 'gameData.phase': 'RESULTS', 'gameData.deadline': Date.now() + 15000, 'gameData.transitioning': false };
                Object.keys(room.players).forEach(pId => {
                    let score = room.players[pId].score || 0;
                    const pGuesses = room.gameData.guesses?.[pId] || {};
                    Object.entries(pGuesses).forEach(([playlistBuilderUid, guessedPromptCreatorUid]) => {
                        const actualPromptCreatorUid = room.gameData.assignments[playlistBuilderUid];
                        if (guessedPromptCreatorUid === actualPromptCreatorUid) score += 100;
                    });
                    updates[`players.${pId}.score`] = score;
                });
                await getRoomRef(room.id).update(updates);
            };

            if (phase === 'PROMPT') {
                const hasSubmitted = !!room.gameData?.prompts?.[user.uid];
                return (
                    <div className="flex-1 flex flex-col items-center justify-center mt-16 md:mt-0 pb-12">
                        <div className="glass-panel p-8 rounded-3xl w-full max-w-lg text-center shadow-2xl">
                            <h2 className="text-4xl font-black mb-4 text-neon-yellow">Set the Vibe</h2>
                            <p className="text-gray-400 mb-8 text-lg">Write a prompt or theme. Someone else will have to build a playlist for it.</p>
                            
                            {!hasSubmitted ? (
                                <>
                                    <textarea 
                                        value={promptInput} onChange={(e) => setPromptInput(e.target.value)}
                                        placeholder="e.g., 'Late night drive contemplating life' or 'Boss fight music'"
                                        className="w-full bg-dark-bg/50 border border-gray-600 rounded-xl p-4 text-white focus:border-neon-yellow focus:outline-none mb-6 h-32 resize-none text-lg"
                                        maxLength="60"
                                    />
                                    <button onClick={submitPrompt} disabled={!promptInput.trim()} className="w-full bg-neon-yellow text-black font-bold py-4 rounded-xl disabled:opacity-50 text-xl hover:bg-yellow-400 transition-colors">Submit Vibe</button>
                                </>
                            ) : (
                                <div>
                                    <h3 className="text-2xl font-bold mb-4">Vibe Submitted!</h3>
                                    <p className="text-gray-400 mb-8">Waiting for others or the timer...</p>
                                </div>
                            )}
                        </div>
                    </div>
                );
            }

            if (phase === 'BUILD') {
                const targetUid = room.gameData.assignments?.[user.uid];
                const targetPrompt = room.gameData.prompts?.[targetUid] || "A mysterious vibe...";
                const hasSubmitted = !!room.gameData?.playlists?.[user.uid];

                return (
                    <div className="flex-1 flex flex-col h-full overflow-hidden mt-16 md:mt-0 pb-6">
                        <div className="text-center mb-6 shrink-0">
                            <p className="text-neon-cyan font-bold uppercase tracking-widest mb-2">Your Assigned Vibe</p>
                            <h2 className="text-2xl md:text-3xl font-black text-white italic px-4">"{targetPrompt}"</h2>
                        </div>

                        {!hasSubmitted ? (
                            <div className="flex-1 flex flex-col md:flex-row gap-6 min-h-0">
                                {/* Search Col */}
                                <div className="flex-1 glass-panel p-4 md:p-6 rounded-3xl flex flex-col min-h-[300px] md:min-h-0">
                                    <div className="flex gap-2 mb-4 bg-dark-bg p-2 rounded-xl border border-gray-700 shrink-0">
                                        <input type="text" value={search} onChange={(e) => setSearch(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && searchItunes(search)} placeholder="Search songs..." className="flex-1 bg-transparent border-none p-2 text-white focus:outline-none"/>
                                        <button onClick={() => searchItunes(search)} className="bg-gray-700 hover:bg-gray-600 px-4 rounded-lg font-bold">Search</button>
                                    </div>
                                    <div className="flex-1 overflow-y-auto hide-scrollbar space-y-2">
                                        {results.map(track => (
                                            <div key={track.trackId} className="flex items-center gap-3 p-3 rounded-xl bg-dark-surface border border-gray-700/50 hover:border-gray-500">
                                                <img src={track.artworkUrl100} className="w-10 h-10 rounded-md" />
                                                <div className="flex-1 overflow-hidden">
                                                    <p className="font-bold truncate text-sm">{track.trackName}</p>
                                                    <p className="text-xs text-gray-400 truncate">{track.artistName}</p>
                                                </div>
                                                <button onClick={() => addSong(track)} className="p-2 bg-neon-cyan/20 text-neon-cyan rounded-lg hover:bg-neon-cyan hover:text-black transition-colors"><Icon name="Plus" size={16}/></button>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                                {/* Playlist Col */}
                                <div className="w-full md:w-1/3 flex flex-col gap-4 shrink-0 md:shrink">
                                    <div className="glass-panel p-6 rounded-3xl flex-1 flex flex-col border-2 border-neon-cyan/30">
                                        <h3 className="font-bold text-xl mb-4 text-neon-cyan">The Playlist ({myPlaylist.length} songs, min 3)</h3>
                                        <div className="flex-1 space-y-3 overflow-y-auto max-h-[400px] hide-scrollbar pr-2">
                                            {myPlaylist.map((s, i) => (
                                                <div key={s.id} className="flex items-center gap-3 bg-dark-bg p-3 rounded-xl border border-neon-cyan/30">
                                                    <span className="text-gray-500 font-bold">{i+1}</span>
                                                    <img src={s.cover} className="w-10 h-10 rounded-md" />
                                                    <div className="flex-1 overflow-hidden">
                                                        <p className="font-bold truncate text-sm">{s.title}</p>
                                                    </div>
                                                    <button onClick={() => removeSong(s.id)} className="text-red-400 hover:text-red-300"><Icon name="Trash2" size={18}/></button>
                                                </div>
                                            ))}
                                            {myPlaylist.length === 0 && <p className="text-gray-500 text-sm text-center mt-10">Add at least 3 songs that fit the vibe.</p>}
                                        </div>
                                        <button onClick={submitPlaylist} disabled={myPlaylist.length < 3} className="w-full mt-6 bg-neon-cyan text-black py-4 rounded-xl font-bold text-lg hover:bg-cyan-400 disabled:opacity-30">Lock In Playlist</button>
                                    </div>
                                </div>
                            </div>
                        ) : (
                            <div className="flex-1 flex items-center justify-center">
                                <div className="text-center glass-panel p-12 rounded-3xl">
                                    <h3 className="text-3xl font-bold mb-4">Playlist Locked! 💿</h3>
                                    <p className="text-gray-400 mb-8">Waiting for others or the timer...</p>
                                </div>
                            </div>
                        )}
                    </div>
                );
            }

            if (phase === 'GUESS') {
                const playlists = Object.entries(room.gameData.playlists || {});
                const promptsList = Object.entries(room.gameData.prompts || {});
                const hasGuessed = !!room.gameData?.guesses?.[user.uid];

                return (
                    <div className="flex-1 flex flex-col h-full pb-20 mt-16 md:mt-0">
                        <div className="text-center mb-6 shrink-0">
                            <h2 className="text-3xl font-black text-white mb-2">Whose vibe is this?</h2>
                            <p className="text-gray-400">Match the curated playlist to the original prompt creator.</p>
                        </div>

                        {!hasGuessed ? (
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6 flex-1 overflow-y-auto hide-scrollbar px-2 pb-10">
                                {playlists.map(([builderId, songs]) => (
                                    <div key={builderId} className="glass-panel p-6 rounded-3xl flex flex-col gap-4 border border-gray-700/50">
                                        <div className="flex flex-col gap-2 mb-2 max-h-48 overflow-y-auto hide-scrollbar">
                                            {songs.length > 0 ? songs.map(s => (
                                                <div key={s.id} className="flex items-center gap-3 bg-dark-surface p-2 rounded-xl border border-gray-700">
                                                    <img src={s.cover} className="w-12 h-12 rounded-md shadow-md"/>
                                                    <div className="flex-1 overflow-hidden text-left">
                                                        <p className="font-bold text-sm truncate text-white">{s.title}</p>
                                                        <p className="text-xs text-gray-400 truncate">{s.artist}</p>
                                                    </div>
                                                </div>
                                            )) : <p className="text-gray-600 font-bold italic py-4 text-center">No playlist submitted</p>}
                                        </div>
                                        <select 
                                            className="w-full mt-auto bg-dark-bg border-2 border-gray-600 rounded-xl p-3 text-white focus:border-neon-pink focus:outline-none font-bold"
                                            value={myGuesses[builderId] || ''}
                                            onChange={(e) => setMyGuesses(prev => ({...prev, [builderId]: e.target.value}))}
                                        >
                                            <option value="" disabled>Guess the Original Vibe...</option>
                                            {promptsList.map(([promptOwnerId, promptText]) => (
                                                <option key={promptOwnerId} value={promptOwnerId}>"{promptText}"</option>
                                            ))}
                                        </select>
                                    </div>
                                ))}
                            </div>
                        ) : (
                            <div className="flex-1 flex items-center justify-center">
                                <div className="text-center glass-panel p-12 rounded-3xl">
                                    <h3 className="text-3xl font-bold mb-4">Guesses Locked!</h3>
                                    <p className="text-gray-400 mb-8">Ready for the chaos?</p>
                                </div>
                            </div>
                        )}

                        {!hasGuessed && (
                            <div className="fixed bottom-6 left-0 w-full flex justify-center px-4 pointer-events-none z-50">
                                <button 
                                    onClick={() => getRoomRef(room.id).update({[`gameData.guesses.${user.uid}`]: myGuesses})} 
                                    disabled={Object.keys(myGuesses).length !== playlists.length}
                                    className="w-full max-w-lg bg-neon-pink text-white font-bold py-4 rounded-2xl shadow-[0_10px_40px_rgba(255,42,109,0.3)] disabled:opacity-0 pointer-events-auto text-xl active:scale-95"
                                >
                                    Submit Guesses
                                </button>
                            </div>
                        )}
                    </div>
                );
            }

            if (phase === 'RESULTS') return <ResultsScreen room={room} />;
            
            return null;
        };

        // --- Mode 5: Chat Chain (WhatsApp Gartic Phone) ---
        const ChatChainGame = ({ room, user, onLeave }) => {
            const isHost = room.host === user.uid;
            const phase = room.gameData?.phase || 'ENCODE';
            
            const submitTime = room.gameData?.settings?.submitTime || 60;
            const guessTime = room.gameData?.settings?.guessTime || 60;

            const [encodeInput, setEncodeInput] = React.useState('');
            const [decodeInput, setDecodeInput] = React.useState('');

            React.useEffect(() => {
                if (!isHost) return;
                const interval = setInterval(() => {
                    if (!room.gameData || room.gameData.transitioning) return;
                    
                    const currentPhase = room.gameData.phase;
                    const deadline = room.gameData.deadline || 0;
                    const timeUp = deadline > 0 && Date.now() >= deadline;

                    if (currentPhase === 'ENCODE') {
                        const allEncoded = Object.keys(room.gameData.encodeSubmissions || {}).length === Object.keys(room.players).length;
                        if (allEncoded || timeUp) {
                            getRoomRef(room.id).update({ 'gameData.transitioning': true });
                            setTimeout(() => assignDecodes(), 1500);
                        }
                    } else if (currentPhase === 'DECODE') {
                        const allDecoded = Object.keys(room.gameData.decodeSubmissions || {}).length === Object.keys(room.players).length;
                        if (allDecoded || timeUp) {
                            getRoomRef(room.id).update({ 'gameData.transitioning': true });
                            setTimeout(() => {
                                getRoomRef(room.id).update({
                                    'gameData.phase': 'RESULTS',
                                    'gameData.deadline': Date.now() + 30000,
                                    'gameData.transitioning': false
                                });
                            }, 1500);
                        }
                    } else if (currentPhase === 'RESULTS') {
                        if (timeUp) {
                            getRoomRef(room.id).update({ 'gameData.transitioning': true });
                            setTimeout(() => getRoomRef(room.id).update({ state: 'LOBBY', gameData: {} }), 1000);
                        }
                    }
                }, 1000);
                return () => clearInterval(interval);
            }, [room, isHost, guessTime]);

            const assignDecodes = async () => {
                const uids = Object.keys(room.players);
                const assignments = generateDerangedAssignments(uids);
                
                const currentEncodes = room.gameData.encodeSubmissions || {};
                const filledEncodes = { ...currentEncodes };
                uids.forEach(pid => {
                    if (!filledEncodes[pid]) filledEncodes[pid] = "🤷‍♂️🚫";
                });

                await getRoomRef(room.id).update({
                    'gameData.encodeSubmissions': filledEncodes,
                    'gameData.assignmentsDecode': assignments || {},
                    'gameData.phase': 'DECODE',
                    'gameData.deadline': Date.now() + (guessTime * 1000),
                    'gameData.transitioning': false
                });
            };

            const submitEncode = async () => {
                if (!encodeInput.trim()) return;
                await getRoomRef(room.id).update({ [`gameData.encodeSubmissions.${user.uid}`]: encodeInput.trim() });
            };

            const submitDecode = async () => {
                if (!decodeInput.trim()) return;
                await getRoomRef(room.id).update({ [`gameData.decodeSubmissions.${user.uid}`]: decodeInput.trim() });
            };

            if (phase === 'ENCODE') {
                const targetPrompt = room.gameData.assignmentsEncode?.[user.uid] || "Loading...";
                const hasSubmitted = !!room.gameData?.encodeSubmissions?.[user.uid];

                return (
                    <div className="flex-1 flex flex-col items-center justify-center mt-16 md:mt-0 pb-12">
                        <div className="glass-panel p-8 rounded-3xl w-full max-w-2xl text-center shadow-2xl border-t-8 border-neon-pink">
                            <h2 className="text-4xl font-black mb-4 text-white">Translate to Emojis</h2>
                            <p className="text-gray-400 mb-8 text-lg">Someone actually sent this in your group chat. Rewrite it using ONLY emojis!</p>
                            
                            <div className="bg-dark-surface p-6 rounded-2xl border border-gray-700 mb-8">
                                <p className="text-2xl md:text-3xl font-medium italic text-neon-yellow">"{targetPrompt}"</p>
                            </div>

                            {!hasSubmitted ? (
                                <>
                                    <input 
                                        type="text" 
                                        value={encodeInput} onChange={(e) => setEncodeInput(e.target.value)}
                                        placeholder="e.g., 🚗💨😱"
                                        className="w-full bg-dark-bg/50 border border-gray-600 rounded-xl p-6 text-4xl text-center text-white focus:border-neon-pink focus:outline-none mb-6 tracking-widest"
                                        maxLength="30"
                                    />
                                    <button onClick={submitEncode} disabled={!encodeInput.trim()} className="w-full bg-neon-pink text-white font-bold py-4 rounded-xl disabled:opacity-50 text-xl hover:bg-pink-500 transition-colors shadow-[0_0_20px_rgba(255,42,109,0.4)]">Submit Emojis</button>
                                </>
                            ) : (
                                <div>
                                    <h3 className="text-2xl font-bold mb-4">Emojis Locked!</h3>
                                    <p className="text-gray-400">Waiting for others or the timer...</p>
                                </div>
                            )}
                        </div>
                    </div>
                );
            }

            if (phase === 'DECODE') {
                const targetUid = room.gameData.assignmentsDecode?.[user.uid];
                const emojisToDecode = room.gameData.encodeSubmissions?.[targetUid] || "🤷‍♂️";
                const hasSubmitted = !!room.gameData?.decodeSubmissions?.[user.uid];

                return (
                    <div className="flex-1 flex flex-col items-center justify-center mt-16 md:mt-0 pb-12">
                        <div className="glass-panel p-8 rounded-3xl w-full max-w-2xl text-center shadow-2xl border-t-8 border-neon-cyan">
                            <h2 className="text-4xl font-black mb-4 text-white">Translate to Text</h2>
                            <p className="text-gray-400 mb-8 text-lg">Someone translated a real chat message into these emojis. What did the original text say?</p>
                            
                            <div className="bg-dark-surface p-8 rounded-2xl border border-gray-700 mb-8 shadow-inner">
                                <p className="text-6xl md:text-7xl filter drop-shadow-md">{emojisToDecode}</p>
                            </div>

                            {!hasSubmitted ? (
                                <>
                                    <textarea 
                                        value={decodeInput} onChange={(e) => setDecodeInput(e.target.value)}
                                        placeholder="What do these emojis mean...?"
                                        className="w-full bg-dark-bg/50 border border-gray-600 rounded-xl p-4 text-white focus:border-neon-cyan focus:outline-none mb-6 h-28 resize-none text-xl text-center"
                                        maxLength="100"
                                    />
                                    <button onClick={submitDecode} disabled={!decodeInput.trim()} className="w-full bg-neon-cyan text-black font-bold py-4 rounded-xl disabled:opacity-50 text-xl hover:bg-cyan-400 transition-colors shadow-[0_0_20px_rgba(5,217,232,0.4)]">Submit Guess</button>
                                </>
                            ) : (
                                <div>
                                    <h3 className="text-2xl font-bold mb-4">Guess Locked!</h3>
                                    <p className="text-gray-400">Waiting for the final reveals...</p>
                                </div>
                            )}
                        </div>
                    </div>
                );
            }

            if (phase === 'RESULTS') {
                const uids = Object.keys(room.players);
                return (
                    <div className="flex-1 flex flex-col h-full mt-16 md:mt-0 pb-12">
                        <div className="text-center mb-8 shrink-0">
                            <h2 className="text-4xl md:text-5xl font-black text-transparent bg-clip-text bg-gradient-to-r from-neon-pink to-neon-cyan pb-2">The Chains</h2>
                            <p className="text-gray-400 text-lg">Did the message survive the translation?</p>
                        </div>
                        <div className="flex-1 overflow-y-auto hide-scrollbar space-y-8 max-w-3xl mx-auto w-full px-2 pb-10">
                            {uids.map(originalUid => {
                                const originalMessage = room.gameData.assignmentsEncode[originalUid];
                                const emojis = room.gameData.encodeSubmissions[originalUid];
                                const decoderUid = Object.keys(room.gameData.assignmentsDecode || {}).find(
                                    uid => room.gameData.assignmentsDecode[uid] === originalUid
                                );
                                const finalGuess = room.gameData.decodeSubmissions?.[decoderUid] || "No guess submitted...";
                                
                                return (
                                    <div key={originalUid} className="glass-panel p-6 md:p-8 rounded-3xl space-y-4 border border-gray-700/50 shadow-lg">
                                        <div className="bg-dark-surface p-4 rounded-2xl border-l-4 border-gray-500 relative mt-4">
                                            <span className="absolute -top-3 left-4 bg-gray-500 text-black text-xs font-bold px-2 py-1 rounded uppercase shadow-sm">Original ({room.players[originalUid]?.name})</span>
                                            <p className="text-xl md:text-2xl font-bold text-gray-200 mt-2">"{originalMessage}"</p>
                                        </div>
                                        
                                        <div className="flex justify-center -my-2">
                                            <div className="bg-dark-bg p-2 rounded-full border border-gray-700 z-10">
                                                <Icon name="ArrowDown" className="text-gray-500" size={20}/>
                                            </div>
                                        </div>

                                        <div className="bg-yellow-900/20 p-6 rounded-2xl border-l-4 border-neon-yellow text-center shadow-inner relative mt-4">
                                            <span className="absolute -top-3 left-4 bg-neon-yellow text-black text-xs font-bold px-2 py-1 rounded uppercase shadow-sm">Translation ({room.players[originalUid]?.name})</span>
                                            <p className="text-4xl md:text-5xl mt-2">{emojis}</p>
                                        </div>

                                        <div className="flex justify-center -my-2">
                                            <div className="bg-dark-bg p-2 rounded-full border border-gray-700 z-10">
                                                <Icon name="ArrowDown" className="text-gray-500" size={20}/>
                                            </div>
                                        </div>

                                        <div className="bg-cyan-900/20 p-4 rounded-2xl border-l-4 border-neon-cyan relative mt-4">
                                            <span className="absolute -top-3 left-4 bg-neon-cyan text-black text-xs font-bold px-2 py-1 rounded uppercase shadow-sm">Guess ({room.players[decoderUid]?.name})</span>
                                            <p className="text-xl md:text-2xl font-bold text-white mt-2">"{finalGuess}"</p>
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                        <div className="mt-6 text-center shrink-0">
                            <p className="text-gray-400 font-bold tracking-widest text-sm animate-pulse">RETURNING TO LOBBY SHORTLY...</p>
                        </div>
                    </div>
                );
            }
            return null;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
