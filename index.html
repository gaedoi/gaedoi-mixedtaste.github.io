<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mixed Taste 🧃</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'neon-pink': '#ff2a6d',
                        'neon-cyan': '#05d9e8',
                        'neon-yellow': '#ffc300',
                        'neon-green': '#1db954',
                        'dark-bg': '#0d0e15',
                        'dark-surface': '#1a1c29',
                        'wa-bg': '#0b141a',
                        'wa-sent': '#005c4b',
                        'wa-recv': '#202c33',
                        'google-bg': '#202124',
                        'google-search': '#303134',
                        'google-link': '#8ab4f8'
                    },
                    fontFamily: {
                        'sans': ['"Space Grotesk"', 'system-ui', 'sans-serif'],
                        'comic': ['"Comic Sans MS"', '"Comic Sans"', 'cursive', 'sans-serif'],
                    },
                    animation: {
                        'blob': 'blob 7s infinite',
                        'pulse-fast': 'pulse 1s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'bounce-slow': 'bounce 2s infinite',
                        'fade-in': 'fadeIn 0.4s ease-out forwards',
                        'slide-up': 'slideUp 0.3s ease-out forwards',
                        'spin-fast': 'spin 1s linear infinite',
                        'spin-prank': 'spin 1.5s ease-in-out',
                    },
                    keyframes: {
                        blob: {
                            '0%': { transform: 'translate(0px, 0px) scale(1)' },
                            '33%': { transform: 'translate(30px, -50px) scale(1.1)' },
                            '66%': { transform: 'translate(-20px, 20px) scale(0.9)' },
                            '100%': { transform: 'translate(0px, 0px) scale(1)' },
                        },
                        fadeIn: {
                            '0%': { opacity: '0', transform: 'scale(0.95)' },
                            '100%': { opacity: '1', transform: 'scale(1)' }
                        },
                        slideUp: {
                            '0%': { opacity: '0', transform: 'translateY(20px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' }
                        }
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">

    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        body { background-color: #0d0e15; color: white; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        .glass-panel {
            background: rgba(26, 28, 41, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        audio::-webkit-media-controls-panel { background-color: #1a1c29; }
        audio::-webkit-media-controls-play-button, audio::-webkit-media-controls-mute-button { background-color: #05d9e8; border-radius: 50%; }
        audio::-webkit-media-controls-current-time-display, audio::-webkit-media-controls-time-remaining-display { color: white; }
        
        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 20px; width: 20px; border-radius: 50%; background: currentColor; cursor: pointer; margin-top: -8px; box-shadow: 0 0 10px currentColor; }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 4px; cursor: pointer; background: rgba(255, 255, 255, 0.2); border-radius: 2px; }

        /* Prank Styles */
        .prank-invert { filter: invert(1) hue-rotate(180deg); }
        .prank-comic * { font-family: 'Comic Sans MS', 'Comic Sans', cursive, sans-serif !important; }
        
        /* Thematic Additions */
        .chat-bubble { position: relative; }
        .chat-bubble-sent::after { content: ''; position: absolute; right: -8px; top: 0; width: 0; height: 0; border: 10px solid transparent; border-left-color: #005c4b; border-right: 0; border-bottom: 0; margin-top: 10px; margin-right: -2px; }
        .chat-bubble-recv::after { content: ''; position: absolute; left: -8px; top: 0; width: 0; height: 0; border: 10px solid transparent; border-right-color: #202c33; border-left: 0; border-bottom: 0; margin-top: 10px; margin-left: -2px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const appId = 'mixed-taste-app';
        let db, auth;

        const firebaseConfig = {
            apiKey: "AIzaSyBks1pTTzyDNMwqKPxb0c3oB0d-q9GteHU",
            authDomain: "mixed-taste.firebaseapp.com",
            projectId: "mixed-taste",
            storageBucket: "mixed-taste.firebasestorage.app",
            messagingSenderId: "990603145775",
            appId: "1:990603145775:web:a36b2bb1c979007f540cda",
            measurementId: "G-38VXJQ6VWS"
        };

        firebase.initializeApp(firebaseConfig);
        db = firebase.firestore();
        auth = firebase.auth();

        const getRoomRef = (roomId) => db.collection('rooms').doc(roomId);

        const generateRoomCode = () => Math.random().toString(36).substring(2, 6).toUpperCase();
        
        const parseWhatsAppLog = (text) => {
            const lines = text.split('\n');
            const messages = [];
            const regexIOS = /^\[(\d{2}\/\d{2}\/\d{4})[,\s]+(\d{2}:\d{2}:\d{2})\]\s([^:]+):\s(.*)$/;
            const regexAndroid = /^(\d{2}\/\d{2}\/\d{2,4})[,\s]+(\d{2}:\d{2})\s-\s([^:]+):\s(.*)$/;
            
            let currentMsg = null;
            for (let line of lines) {
                line = line.trim();
                if (!line) continue;
                if (line.includes('‎') || line.includes('omitted') || line.includes('This message was deleted')) continue; 

                const match = line.match(regexIOS) || line.match(regexAndroid);
                if (match) {
                    if (currentMsg && currentMsg.text.length > 3) messages.push(currentMsg);
                    const sender = match[3].trim();
                    if (sender.includes('added') || sender.includes('changed') || sender.length > 25) continue;
                    currentMsg = { date: match[1], time: match[2], sender: sender, text: match[4].trim() };
                } else if (currentMsg) {
                    currentMsg.text += " " + line;
                }
            }
            if (currentMsg && currentMsg.text.length > 3) messages.push(currentMsg);
            return messages;
        };

        const generateWhatsappQuestions = (messages, numQuestions = 6) => {
            const questions = [];
            const senders = [...new Set(messages.map(m => m.sender))];
            if (senders.length < 2 || messages.length < 20) return null;

            for (let i = 0; i < numQuestions; i++) {
                const type = Math.random() > 0.5 ? 'who_said' : 'fill_blank';
                if (type === 'who_said') {
                    const validMsgs = messages.filter(m => m.text.length > 15);
                    if (validMsgs.length === 0) continue;
                    const msg = validMsgs[Math.floor(Math.random() * validMsgs.length)];
                    let options = new Set([msg.sender]);
                    while(options.size < Math.min(4, senders.length)) {
                        options.add(senders[Math.floor(Math.random() * senders.length)]);
                    }
                    questions.push({ id: `q_${i}`, type: 'who_said', text: `"${msg.text}"`, options: Array.from(options).sort(() => Math.random() - 0.5), correctAnswer: msg.sender });
                } else {
                    const idx = Math.floor(Math.random() * (messages.length - 2));
                    const contextMsg = messages[idx];
                    const targetMsg = messages[idx + 1];
                    let options = new Set([targetMsg.text]);
                    const senderMsgs = messages.filter(m => m.sender === targetMsg.sender && m.text !== targetMsg.text && m.text.length > 3);
                    while(options.size < 4 && senderMsgs.length > options.size) {
                       options.add(senderMsgs[Math.floor(Math.random() * senderMsgs.length)].text);
                    }
                    questions.push({ id: `q_${i}`, type: 'fill_blank', context: `${contextMsg.sender}: "${contextMsg.text}"\n\n${targetMsg.sender}: ...`, options: Array.from(options).sort(() => Math.random() - 0.5), correctAnswer: targetMsg.text });
                }
            }
            return questions;
        };

        const generateEmojiQuestions = (messages, numQuestions = 5) => {
            const emojiStats = {}; 
            const emojiRegex = /\p{Emoji_Presentation}|\p{Extended_Pictographic}/gu;
            messages.forEach(m => {
                const emojis = m.text.match(emojiRegex);
                if (emojis) {
                    emojis.forEach(e => {
                        if (!emojiStats[e]) emojiStats[e] = {};
                        emojiStats[e][m.sender] = (emojiStats[e][m.sender] || 0) + 1;
                    });
                }
            });
            const validEmojis = Object.entries(emojiStats)
                .map(([emoji, counts]) => {
                    const sorted = Object.entries(counts).sort((a,b) => b[1] - a[1]);
                    return { emoji, topSender: sorted[0][0], maxCount: sorted[0][1] };
                })
                .filter(e => e.maxCount >= 2) 
                .sort(() => Math.random() - 0.5); 
            const senders = [...new Set(messages.map(m => m.sender))];
            const questions = [];
            for (let i = 0; i < Math.min(numQuestions, validEmojis.length); i++) {
                const target = validEmojis[i];
                let options = new Set([target.topSender]);
                while(options.size < Math.min(4, senders.length)) {
                    options.add(senders[Math.floor(Math.random() * senders.length)]);
                }
                questions.push({ id: `eq_${i}`, emoji: target.emoji, options: Array.from(options).sort(() => Math.random() - 0.5), correctAnswer: target.topSender });
            }
            return questions.length > 0 ? questions : null;
        };

        const generateDerangedAssignments = (uids) => {
            if (uids.length < 2) return null;
            let shuffled, valid = false, attempts = 0;
            while (!valid && attempts < 100) {
                shuffled = [...uids].sort(() => Math.random() - 0.5);
                valid = true;
                for (let i=0; i<uids.length; i++) {
                    if (uids[i] === shuffled[i]) valid = false;
                }
                attempts++;
            }
            if (!valid) return null;
            const assignments = {};
            uids.forEach((uid, i) => assignments[uid] = shuffled[i]);
            return assignments;
        };

        const Icon = ({ name, size = 24, className = '' }) => {
            const getIcon = () => {
                switch(name) {
                    case 'Music': return <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>;
                    case 'MessageCircle': return <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M7.9 20A9 9 0 1 0 4 16.1L2 22Z"/></svg>;
                    case 'Play': return <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="5 3 19 12 5 21 5 3"/></svg>;
                    case 'Crown': return <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m2 4 3 12h14l3-12-6 7-4-7-4 7-6-7zm3 16h14"/></svg>;
                    case 'ListMusic': return <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 15V6"/><path d="M18.5 18a2.5 2.5 0 1 0 0-5 2.5 2.5 0 0 0 0 5Z"/><path d="M12 12H3"/><path d="M16 6H3"/><path d="M12 18H3"/></svg>;
                    case 'Smile': return <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>;
                    case 'UploadCloud': return <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M4 14.899A7 7 0 1 1 15.71 8h1.79a4.5 4.5 0 0 1 2.5 8.242"/><path d="M12 12v9"/><path d="m16 16-4-4-4 4"/></svg>;
                    case 'Plus': return <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>;
                    case 'Trash2': return <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>;
                    case 'Timer': return <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>;
                    case 'ArrowDown': return <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="12" y1="5" x2="12" y2="19"/><polyline points="19 12 12 19 5 12"/></svg>;
                    case 'Link': return <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>;
                    case 'Settings': return <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>;
                    case 'HeartPulse': return <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/><path d="M3.22 12H9.5l.5-1 2 4.5 2-7 1.5 3.5h5.27"/></svg>;
                    case 'Search': return <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>;
                    case 'RefreshCw': return <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>;
                    case 'Wand2': return <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m21.64 3.64-1.28-1.28a1.21 1.21 0 0 0-1.72 0L2.36 18.64a1.21 1.21 0 0 0 0 1.72l1.28 1.28a1.2 1.2 0 0 0 1.72 0L21.64 5.36a1.2 1.2 0 0 0 0-1.72Z"/><path d="m14 7 3 3"/><path d="M5 6v4"/><path d="M19 14v4"/><path d="M10 2v2"/><path d="M7 8H3"/><path d="M21 16h-4"/><path d="M11 3H9"/></svg>;
                    default: return null;
                }
            };
            return getIcon();
        };

        const PlayerAvatar = ({ player, size = '10' }) => {
            if (player?.pfp) return <img src={player.pfp} className={`w-${size} h-${size} rounded-full border-2 border-neon-cyan object-cover bg-white shrink-0`} alt={player.name} />;
            const initial = player?.name ? player.name.charAt(0).toUpperCase() : '?';
            return <div className={`w-${size} h-${size} rounded-full bg-gradient-to-tr from-neon-pink to-neon-yellow flex items-center justify-center font-bold text-black text-lg shadow-inner shrink-0`}>{initial}</div>;
        };

        const TimerDisplay = ({ deadline, maciMode }) => {
            const [timeLeft, setTimeLeft] = React.useState(0);
            React.useEffect(() => {
                if (maciMode || !deadline) return;
                const update = () => setTimeLeft(Math.max(0, Math.floor((deadline - Date.now()) / 1000)));
                update();
                const interval = setInterval(update, 1000);
                return () => clearInterval(interval);
            }, [deadline, maciMode]);
            if (maciMode) {
                return (
                    <div className="fixed top-4 md:top-6 left-1/2 -translate-x-1/2 z-[60] glass-panel px-6 py-2 rounded-full border-2 border-neon-cyan/50 text-neon-cyan font-mono font-bold text-xl md:text-2xl flex items-center gap-2 shadow-lg transition-colors animate-pulse">
                        <Icon name="Timer" size={24} /> Waiting for Maci...
                    </div>
                );
            }
            if (!deadline || timeLeft <= 0) return null;
            const isUrgent = timeLeft <= 10;
            return (
                <div className={`fixed top-4 md:top-6 left-1/2 -translate-x-1/2 z-[60] glass-panel px-6 py-2 rounded-full border-2 ${isUrgent ? 'border-neon-pink text-neon-pink animate-pulse' : 'border-neon-cyan/50 text-neon-cyan'} font-mono font-bold text-xl md:text-2xl flex items-center gap-2 shadow-lg transition-colors`}>
                    <Icon name="Timer" size={24} /> 00:{timeLeft.toString().padStart(2, '0')}
                </div>
            );
        };

        const WaitingFor = ({ players, completedIds }) => {
            const waitingForIds = Object.keys(players).filter(id => !completedIds.includes(id));
            if (waitingForIds.length === 0) return null;
            return (
                <div className="mt-8 flex flex-col items-center animate-fade-in">
                    <p className="text-sm font-bold text-gray-400 mb-3 tracking-widest uppercase">Waiting For</p>
                    <div className="flex flex-wrap justify-center gap-2">
                        {waitingForIds.map(id => (
                            <div key={id} className="bg-dark-bg border border-gray-600 px-4 py-2 rounded-full text-sm font-bold text-gray-300 shadow-inner flex items-center gap-2">
                                <div className="w-2 h-2 rounded-full bg-neon-pink animate-pulse"></div>
                                {players[id].name}
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const PrankLayer = ({ room, user }) => {
            const [activePrank, setActivePrank] = React.useState(null);

            React.useEffect(() => {
                if (!room?.prank) return;
                const { id, type, target } = room.prank;
                
                // If it's a new prank and targets us
                if ((target === 'all' || target === user.uid)) {
                    setActivePrank(type);
                    
                    if (type === 'SPIN') document.body.classList.add('animate-spin-prank');
                    if (type === 'INVERT') document.body.classList.add('prank-invert');
                    if (type === 'COMIC') document.getElementById('root').classList.add('prank-comic');
                    
                    setTimeout(() => {
                        setActivePrank(null);
                        document.body.classList.remove('animate-spin-prank', 'prank-invert');
                        document.getElementById('root').classList.remove('prank-comic');
                    }, 5000);
                }
            }, [room?.prank?.id]);

            if (activePrank === 'JUMPSCARE') {
                return (
                    <div className="fixed inset-0 z-[9999] flex items-center justify-center bg-red-600 animate-pulse-fast">
                        <h1 className="text-[15vw] font-black text-black tracking-tighter text-center leading-none">WAKE<br/>UP!</h1>
                    </div>
                );
            }
            if (activePrank === 'FAKE_ERROR') {
                return (
                    <div className="fixed inset-0 z-[9999] flex items-center justify-center bg-black/90 backdrop-blur-sm">
                        <div className="bg-dark-surface border-2 border-red-500 p-8 rounded-xl max-w-md w-full text-center">
                            <Icon name="Search" size={48} className="text-red-500 mx-auto mb-4 animate-spin-fast" />
                            <h2 className="text-2xl font-bold text-red-500 mb-2">Connection Lost</h2>
                            <p className="text-gray-300 font-mono text-sm">Attempting to reconnect...<br/>Deleting User Data...</p>

        const HostOverrideButton = ({ room, user }) => {

        const CanvasPFP = ({ room, user }) => {
            const canvasRef = React.useRef(null);
            const [isDrawing, setIsDrawing] = React.useState(false);
            const [hasDrawn, setHasDrawn] = React.useState(false);

            React.useEffect(() => {
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                ctx.fillStyle = "white";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.lineCap = 'round'; ctx.lineJoin = 'round'; ctx.lineWidth = 4; ctx.strokeStyle = 'black';
            }, []);

            const getCoordinates = (e) => {
                const canvas = canvasRef.current;
                const rect = canvas.getBoundingClientRect();
                const scaleX = canvas.width / rect.width;
                const scaleY = canvas.height / rect.height;
                if (e.touches && e.touches.length > 0) return { x: (e.touches[0].clientX - rect.left) * scaleX, y: (e.touches[0].clientY - rect.top) * scaleY };
                return { x: (e.clientX - rect.left) * scaleX, y: (e.clientY - rect.top) * scaleY };
            };

            const startDrawing = (e) => {
                if (e.type === 'touchstart') e.preventDefault(); // crucial for mobile canvas
                const { x, y } = getCoordinates(e);
                const ctx = canvasRef.current.getContext('2d');
                ctx.beginPath(); ctx.moveTo(x, y);
                setIsDrawing(true);
            };

            const draw = (e) => {
                if (!isDrawing) return;
                if (e.type === 'touchmove') e.preventDefault();
                const { x, y } = getCoordinates(e);
                const ctx = canvasRef.current.getContext('2d');
                ctx.lineTo(x, y); ctx.stroke();
                setHasDrawn(true);
            };

            const stopDrawing = () => {
                if (isDrawing) {
                    const ctx = canvasRef.current.getContext('2d');
                    ctx.closePath();
                    setIsDrawing(false);
                }
            };

            const clearCanvas = () => {
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                ctx.fillStyle = "white"; ctx.fillRect(0, 0, canvas.width, canvas.height);
                setHasDrawn(false);
            };

            const savePFP = async () => {
                if (!hasDrawn) return;
                const dataUrl = canvasRef.current.toDataURL('image/jpeg', 0.5);
                await getRoomRef(room.id).update({ [`players.${user.uid}.pfp`]: dataUrl });
            };

            return (
                <div className="bg-dark-surface p-4 rounded-2xl border border-gray-700/50 flex flex-col items-center gap-3">
                    <p className="text-sm font-bold text-neon-cyan uppercase tracking-widest">Draw your PFP!</p>
                    <canvas 
                        ref={canvasRef} width={150} height={150}
                        className="bg-white rounded-xl shadow-inner border-2 border-gray-600 touch-none cursor-crosshair w-[150px] h-[150px]"
                        onMouseDown={startDrawing} onMouseMove={draw} onMouseUp={stopDrawing} onMouseLeave={stopDrawing}
                        onTouchStart={startDrawing} onTouchMove={draw} onTouchEnd={stopDrawing}
                    />
                    <div className="flex gap-2 w-full max-w-[150px]">
                        <button onClick={clearCanvas} className="flex-1 bg-gray-700 text-white text-xs font-bold py-2 rounded-lg transition-transform active:scale-95">Clear</button>
                        <button onClick={savePFP} disabled={!hasDrawn} className="flex-1 bg-neon-cyan text-black text-xs font-bold py-2 rounded-lg disabled:opacity-50 transition-transform active:scale-95">Save</button>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [user, setUser] = React.useState(null);
            const [room, setRoom] = React.useState(null);
            const [playerName, setPlayerName] = React.useState('');
            const [error, setError] = React.useState('');

            React.useEffect(() => {
                if (!auth) { setError("Firebase not initialized."); return; }
                const initAuth = async () => { try { await auth.signInAnonymously(); } catch (err) { setError("Failed to connect to game servers."); } };
                initAuth();
                const unsubscribe = auth.onAuthStateChanged(u => {
                    setUser(u);
                    const savedName = localStorage.getItem('mixedTasteName');
                    if (savedName) setPlayerName(savedName);
                });
                return () => unsubscribe();
            }, []);

            React.useEffect(() => {
                if (!user || !room?.id) return;
                const unsub = getRoomRef(room.id).onSnapshot(
                    (doc) => {
                        if (doc.exists) setRoom({ id: doc.id, ...doc.data() });
                        else { setRoom(null); setError("Room closed by host."); }
                    },
                    (err) => console.error("Room sync error:", err)
                );
                return () => unsub();
            }, [user, room?.id]);

            React.useEffect(() => {
                if (error) { const timer = setTimeout(() => setError(''), 5000); return () => clearTimeout(timer); }
            }, [error]);

            const handleCreateRoom = async (name) => {
                if (!user) return;
                const roomId = generateRoomCode();
                try {
                    await getRoomRef(roomId).set({ host: user.uid, state: 'LOBBY', currentMode: 'song_king', players: { [user.uid]: { name, score: 0, ready: false } }, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
                    localStorage.setItem('mixedTasteName', name);
                    setRoom({ id: roomId });
                } catch (err) { setError("Failed to create room."); }
            };

            const handleJoinRoom = async (roomId, name) => {
                if (!user) return;
                try {
                    const roomDoc = await getRoomRef(roomId).get();
                    if (!roomDoc.exists) { setError("Room not found."); return; }
                    if (roomDoc.data().state !== 'LOBBY') { setError("Game already in progress."); return; }
                    await getRoomRef(roomId).update({ [`players.${user.uid}`]: { name, score: 0, ready: false } });
                    localStorage.setItem('mixedTasteName', name);
                    setRoom({ id: roomId });
                } catch (err) { setError("Failed to join room."); }
            };

            const leaveRoom = async () => {
                if (room && user) {
                    if (room.host === user.uid) await getRoomRef(room.id).delete();
                    else await getRoomRef(room.id).update({ [`players.${user.uid}`]: firebase.firestore.FieldValue.delete() });
                }
                setRoom(null);
            };

            if (!user) return <div className="min-h-screen flex items-center justify-center font-sans text-neon-cyan animate-pulse">Connecting to servers...</div>;

            return (
                <div className="min-h-[100dvh] relative overflow-x-hidden font-sans">
                    <div className="absolute top-[-10%] left-[-10%] w-96 h-96 bg-neon-pink rounded-full mix-blend-multiply filter blur-[128px] opacity-20 animate-blob"></div>
                    <div className="absolute top-[20%] right-[-10%] w-96 h-96 bg-neon-cyan rounded-full mix-blend-multiply filter blur-[128px] opacity-20 animate-blob animation-delay-2000"></div>
                    <div className="absolute bottom-[-20%] left-[20%] w-96 h-96 bg-neon-yellow rounded-full mix-blend-multiply filter blur-[128px] opacity-20 animate-blob animation-delay-4000"></div>

                    <div className="absolute top-4 right-4 md:top-6 md:right-6 z-[40] glass-panel px-4 py-2 rounded-full flex items-center gap-3 shadow-lg border border-gray-700/50 transition-transform hover:scale-105 cursor-default hidden sm:flex">
                        <span className="text-xs md:text-sm font-bold text-gray-300 tracking-wide">Idea by Charlie Blake</span>
                        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSW_C7jBu-wEIBaM8ja0qSmsuUnMpIk5xPstg&s" alt="Charlie Blake" className="w-8 h-8 rounded-full border-2 border-neon-cyan object-cover shadow-[0_0_10px_rgba(5,217,232,0.5)]" />
                    </div>

                    {room && <PrankLayer room={room} user={user} />}
                    {room && room.state === 'PLAYING' && room.gameData?.phase !== 'RESULTS' && <HostOverrideButton room={room} user={user} />}
                    {room && <AdminPanel room={room} isHost={room.host === user.uid} onError={setError} />}

                    {room && room.state === 'PLAYING' && <TimerDisplay deadline={room.gameData?.deadline} maciMode={room.gameData?.settings?.maciMode} />}

                    <div className="relative z-10 p-4 md:p-8 max-w-5xl mx-auto min-h-[100dvh] flex flex-col">
                        {/* Error Toast */}
                        <div className={`fixed top-10 left-1/2 -translate-x-1/2 z-[100] transition-all duration-300 ${error ? 'opacity-100 translate-y-0' : 'opacity-0 -translate-y-10 pointer-events-none'}`}>
                            <div className="bg-red-900/90 border border-red-500 text-red-100 px-6 py-3 rounded-full flex items-center gap-4 shadow-[0_0_20px_rgba(220,38,38,0.5)] backdrop-blur">
                                <span className="font-bold">{error}</span>
                                <button onClick={() => setError('')} className="font-bold hover:text-white transition">✕</button>

                        {!room ? (

                        ) : room.state === 'LOBBY' ? (
                            <LobbyScreen room={room} user={user} onLeave={leaveRoom} onError={setError} />
                        ) : (
                            <GameManager room={room} user={user} onLeave={leaveRoom} />
                        )}
                    </div>
                </div>
            );
        };

        const HomeScreen = ({ onCreate, onJoin, defaultName }) => {
            const [name, setName] = React.useState(defaultName);
            const [roomCode, setRoomCode] = React.useState('');
            return (
                <div className="flex-1 flex flex-col items-center justify-center text-center mt-16 md:mt-0 py-8">
                    <div className="mb-8 md:mb-12 relative animate-fade-in">
                        <h1 className="text-6xl md:text-8xl font-bold mb-2 tracking-tighter text-transparent bg-clip-text bg-gradient-to-br from-neon-pink via-neon-yellow to-neon-cyan pb-2">Mixed Taste</h1>
                        <p className="text-gray-400 text-lg md:text-xl font-medium tracking-wide">The chaotic friend group party game.</p>
                    </div>
                    <div className="glass-panel p-6 md:p-8 rounded-3xl w-full max-w-md shadow-2xl border border-gray-700/50 mb-8 animate-slide-up">
                        <div className="mb-6 text-left">
                            <label className="block text-sm font-semibold text-gray-300 mb-2 uppercase tracking-widest">Player Name</label>
                            <input type="text" value={name} onChange={(e) => setName(e.target.value)} className="w-full bg-dark-bg/50 border border-gray-600 rounded-xl p-4 text-white focus:border-neon-cyan focus:outline-none focus:ring-2 focus:ring-neon-cyan/20 transition-all text-lg font-medium" placeholder="e.g. DJ Chaos" maxLength="15" />
                        </div>
                        <button onClick={() => name && onCreate(name)} disabled={!name} className="w-full bg-gradient-to-r from-neon-pink to-pink-600 disabled:opacity-50 text-white font-bold py-4 px-4 rounded-xl transition-transform active:scale-95 flex items-center justify-center gap-2 shadow-lg shadow-neon-pink/20"><Icon name="Crown" size={20} /> Create New Room</button>
                        <div className="my-8 relative"><div className="absolute inset-0 flex items-center"><div className="w-full border-t border-gray-700"></div></div><div className="relative flex justify-center"><span className="bg-[#1a1c29] px-4 text-sm text-gray-400 font-bold tracking-widest">OR</span></div></div>
                        <div className="flex flex-col sm:flex-row gap-3 w-full">
                            <input type="text" value={roomCode} onChange={(e) => setRoomCode(e.target.value.toUpperCase())} className="w-full bg-dark-bg/50 border border-gray-600 rounded-xl p-4 text-white uppercase text-center tracking-[0.3em] font-mono focus:border-neon-cyan focus:outline-none text-xl" placeholder="CODE" maxLength="4" />
                            <button onClick={() => name && roomCode.length === 4 && onJoin(roomCode, name)} disabled={!name || roomCode.length !== 4} className="w-full sm:w-auto bg-neon-cyan hover:bg-cyan-500 disabled:opacity-50 text-black font-bold py-4 px-8 rounded-xl transition-transform active:scale-95 shadow-lg shadow-neon-cyan/20">Join</button>
                        </div>
                    </div>
                </div>
            );
        };

        const LobbyScreen = ({ room, user, onLeave, onError }) => {
            const isHost = room.host === user.uid;
            const players = Object.entries(room.players || {});
            const [parsingLog, setParsingLog] = React.useState('');

            const [quizTime, setQuizTime] = React.useState(20);
            const [submitTime, setSubmitTime] = React.useState(60);
            const [guessTime, setGuessTime] = React.useState(60);
            const [maciMode, setMaciMode] = React.useState(false);

            const modes = [
                { id: 'song_king', name: 'Song King', icon: 'Music', desc: 'Secretly submit songs. Guess who picked what.', active: true },
                { id: 'playlist_ring', name: 'Playlist Ring', icon: 'ListMusic', desc: 'Create a prompt. Build a playlist. Cause chaos.', active: true },
                { id: 'whatsapp', name: 'Whatsapp Expozed', icon: 'MessageCircle', desc: 'Upload a chat export. Get quizzed on your chaos.', active: true },
                { id: 'emoji_go', name: 'Emoji Go With Who?', icon: 'Smile', desc: 'Analyzes chat logs to find who uses 💀 the most.', active: true },
                { id: 'chat_chain', name: 'Chat Chain', icon: 'Link', desc: 'Whatsapp Gartic Phone. Turn real texts to emojis and back.', active: true },
                { id: 'chat_soundtrack', name: 'Chat Soundtrack', icon: 'HeartPulse', desc: 'Find the perfect iTunes song to score a random WhatsApp quote.', active: true },
                { id: 'google_it', name: 'Google It!', icon: 'Search', desc: 'Someone Googles a prompt, everyone answers. Best answer wins.', active: true }
            ];

            const setMode = async (modeId) => {
                if (!isHost) return;
                await getRoomRef(room.id).update({ currentMode: modeId });
            };

            const toggleReady = async () => {
                const currentReady = room.players[user.uid]?.ready;
                await getRoomRef(room.id).update({ [`players.${user.uid}.ready`]: !currentReady });
            };

            const handleFileUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                setParsingLog('Analyzing chaos...');
                const reader = new FileReader();
                reader.onload = async (e) => {
                    const text = e.target.result;
                    const messages = parseWhatsAppLog(text);
                    if (messages.length < 20) { setParsingLog('❌ Error: Need at least 20 messages in log.'); return; }
                    const wpQs = generateWhatsappQuestions(messages, 6);
                    const emQs = generateEmojiQuestions(messages, 6);
                    if (!wpQs && !emQs) { setParsingLog('❌ Error: Not enough varied senders/data.'); return; }
                    const validMsgs = messages.filter(m => m.text.length > 10 && m.text.length < 150);
                    const chatMessages = validMsgs.sort(() => Math.random() - 0.5).slice(0, 40);
                    await getRoomRef(room.id).update({
                        'gameData.whatsappQuestions': wpQs || [], 'gameData.emojiQuestions': emQs || [], 'gameData.chatMessages': chatMessages
                    });
                    setParsingLog(`✅ Success! Loaded data from ${messages.length} messages.`);
                };
                reader.readAsText(file);
            };

            const resetScores = async () => {
                if (!isHost) return;
                let updates = {};
                Object.keys(room.players).forEach(pId => { updates[`players.${pId}.score`] = 0; });
                await getRoomRef(room.id).update(updates);
            };

            const startGame = async () => {
                if (!isHost) return;
                let initialData = { settings: { quizTime, submitTime, guessTime, maciMode } };

                if (room.currentMode === 'song_king') {
                    initialData.phase = 'SUBMIT'; initialData.songs = {}; initialData.guesses = {}; initialData.deadline = Date.now() + (submitTime * 1000);
                } else if (room.currentMode === 'playlist_ring') {
                    initialData.phase = 'PROMPT'; initialData.prompts = {}; initialData.assignments = {}; initialData.playlists = {}; initialData.guesses = {}; initialData.lockedIn = {}; initialData.deadline = Date.now() + (submitTime * 1000);
                } else if (room.currentMode === 'whatsapp') {
                    if (!room.gameData?.whatsappQuestions?.length) { onError("Upload a WhatsApp log first!"); return; }
                    initialData.phase = 'QUESTION'; initialData.currentQIndex = 0; initialData.answers = {}; initialData.questions = room.gameData.whatsappQuestions; initialData.deadline = Date.now() + (quizTime * 1000);
                } else if (room.currentMode === 'emoji_go') {
                    if (!room.gameData?.emojiQuestions?.length) { onError("Upload a WhatsApp log with Emoji usage first!"); return; }
                    initialData.phase = 'QUESTION'; initialData.currentQIndex = 0; initialData.answers = {}; initialData.questions = room.gameData.emojiQuestions; initialData.deadline = Date.now() + (quizTime * 1000);
                } else if (room.currentMode === 'chat_chain') {
                    if (!room.gameData?.chatMessages?.length) { onError("Upload a WhatsApp log first!"); return; }
                    const uids = Object.keys(room.players);
                    const messagesPool = [...room.gameData.chatMessages];
                    const initialAssignments = {};
                    uids.forEach(uid => { initialAssignments[uid] = messagesPool.pop()?.text || "Hello world"; });
                    initialData.phase = 'ENCODE'; initialData.assignmentsEncode = initialAssignments; initialData.encodeSubmissions = {}; initialData.assignmentsDecode = {}; initialData.decodeSubmissions = {}; initialData.deadline = Date.now() + (submitTime * 1000);
                } else if (room.currentMode === 'chat_soundtrack') {
                    if (!room.gameData?.chatMessages?.length) { onError("Upload a WhatsApp log first!"); return; }
                    const messagesPool = [...room.gameData.chatMessages];
                    initialData.promptMessage = messagesPool[Math.floor(Math.random() * messagesPool.length)];
                    initialData.phase = 'SUBMIT'; initialData.songs = {}; initialData.votes = {}; initialData.deadline = Date.now() + (submitTime * 1000);
                } else if (room.currentMode === 'google_it') {
                    const uids = Object.keys(room.players);
                    const randomGoogler = uids[Math.floor(Math.random() * uids.length)];
                    initialData.phase = 'PROMPT'; initialData.googler = randomGoogler; initialData.prompt = ''; initialData.answers = {}; initialData.votes = {}; initialData.deadline = Date.now() + (submitTime * 1000);
                }

                let updates = { state: 'PLAYING', gameData: initialData };
                Object.keys(room.players).forEach(pId => { updates[`players.${pId}.ready`] = false; });
                await getRoomRef(room.id).update(updates);
            };

            return (
                <div className="flex-1 flex flex-col md:flex-row gap-6 h-full mt-14 md:mt-0 pb-8 animate-fade-in">
                    <div className="w-full md:w-2/3 flex flex-col gap-6 pb-6">
                        <div className="glass-panel p-6 rounded-3xl flex justify-between items-center shadow-lg">
                            <div>
                                <h2 className="text-sm text-neon-pink font-bold tracking-[0.2em] uppercase mb-1">Room Code</h2>
                                <p className="text-4xl md:text-5xl font-mono tracking-widest font-black text-white drop-shadow-md">{room.id}</p>
                            </div>
                            <button onClick={onLeave} className="text-gray-400 hover:text-white px-4 py-2 rounded-lg border border-gray-600 hover:border-gray-400 hover:bg-gray-800 transition">Leave</button>
                        </div>

                        <div className="glass-panel p-6 rounded-3xl flex-1 shadow-lg">
                            <h2 className="text-2xl font-bold mb-6">Select Mode</h2>
                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                {modes.map(m => (
                                    <div key={m.id} onClick={() => m.active && isHost && setMode(m.id)} className={`p-5 rounded-2xl border-2 transition-all ${!m.active ? 'opacity-50 cursor-not-allowed border-gray-700 bg-gray-800/50' : room.currentMode === m.id ? 'border-neon-cyan bg-cyan-900/20 shadow-[0_0_15px_rgba(5,217,232,0.2)] scale-[1.02]' : 'border-gray-700 hover:border-gray-500 cursor-pointer'} ${!isHost && m.active ? 'pointer-events-none' : ''}`}>
                                        <div className="flex items-center gap-3 mb-2"><Icon name={m.icon} className={room.currentMode === m.id ? 'text-neon-cyan' : 'text-gray-400'} /><h3 className="font-bold text-lg">{m.name}</h3></div>
                                        <p className="text-sm text-gray-400 leading-relaxed">{m.desc}</p>
                                    </div>
                                ))}
                            </div>

                            {['whatsapp', 'emoji_go', 'chat_chain', 'chat_soundtrack'].includes(room.currentMode) && isHost && (
                                <div className="mt-8 p-5 border-2 border-neon-yellow/50 bg-yellow-900/10 rounded-2xl">
                                    <h3 className="font-bold text-neon-yellow mb-2 flex items-center gap-2"><Icon name="UploadCloud" size={20}/> Host: Upload WhatsApp Log</h3>
                                    <p className="text-sm text-gray-300 mb-4 leading-relaxed">Export a WhatsApp chat (Without Media) as a <b>.txt</b> file. Processing is done 100% locally.</p>
                                    <label className="block w-full text-center py-3 px-4 rounded-xl border-2 border-dashed border-gray-600 hover:border-neon-yellow cursor-pointer transition-colors">
                                        <span className="text-neon-yellow font-bold">Choose .txt File</span>
                                        <input type="file" accept=".txt" onChange={handleFileUpload} className="hidden"/>
                                    </label>
                                    {parsingLog && <p className="mt-4 text-sm font-mono bg-dark-bg p-2 rounded text-center text-neon-cyan">{parsingLog}</p>}
                                </div>
                            )}

                            {isHost && (
                                <div className="mt-8 p-6 border-2 border-gray-700 bg-dark-surface rounded-2xl">
                                    <div className="flex justify-between items-center mb-6">
                                        <h3 className="font-bold text-white flex items-center gap-2"><Icon name="Settings" size={20}/> Time Limits</h3>
                                        <label className="flex items-center cursor-pointer">
                                            <div className="relative">
                                                <input type="checkbox" className="sr-only" checked={maciMode} onChange={e=>setMaciMode(e.target.checked)} />
                                                <div className="block bg-gray-600 w-14 h-8 rounded-full"></div>
                                                <div className={`dot absolute left-1 top-1 bg-white w-6 h-6 rounded-full transition transform ${maciMode ? 'translate-x-6 bg-neon-pink' : ''}`}></div>
                                            </div>
                                            <div className="ml-3 text-white font-bold text-sm">Maci Mode <span className="text-gray-400 font-normal hidden sm:inline">(Infinite Time)</span></div>
                                        </label>
                                    </div>
                                    <div className={`space-y-6 transition-opacity ${maciMode ? 'opacity-30 pointer-events-none' : 'opacity-100'}`}>
                                        <div><label className="flex justify-between text-sm font-bold text-gray-400 mb-2"><span>Quiz Rounds <span className="font-normal text-xs ml-1">(WhatsApp/Emoji)</span></span><span className="text-neon-cyan">{quizTime}s</span></label><input type="range" min="10" max="60" step="5" value={quizTime} onChange={e=>setQuizTime(Number(e.target.value))} className="text-neon-cyan" /></div>
                                        <div><label className="flex justify-between text-sm font-bold text-gray-400 mb-2"><span>Submit Phase <span className="font-normal text-xs ml-1">(Songs/Prompts/Emojis)</span></span><span className="text-neon-pink">{submitTime}s</span></label><input type="range" min="10" max="120" step="10" value={submitTime} onChange={e=>setSubmitTime(Number(e.target.value))} className="text-neon-pink" /></div>
                                        <div><label className="flex justify-between text-sm font-bold text-gray-400 mb-2"><span>Guess Phase <span className="font-normal text-xs ml-1">(Playlists/Chains)</span></span><span className="text-neon-yellow">{guessTime}s</span></label><input type="range" min="10" max="120" step="10" value={guessTime} onChange={e=>setGuessTime(Number(e.target.value))} className="text-neon-yellow" /></div>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>

                    <div className="w-full md:w-1/3 flex flex-col gap-4">
                        <div className="glass-panel p-6 rounded-3xl flex-1 flex flex-col shadow-lg">
                            <h2 className="text-xl font-bold mb-6 flex justify-between items-center">
                                Players <span className="bg-gray-800 text-neon-cyan font-mono px-3 py-1 rounded-full">{players.length}</span>
                            </h2>
                            <div className="flex-1 overflow-y-auto hide-scrollbar space-y-3 mb-6 min-h-[150px]">
                                {players.map(([id, p]) => (
                                    <div key={id} className="flex items-center justify-between bg-dark-surface p-4 rounded-xl border border-gray-700/50 shadow-sm transition-all hover:border-gray-500">
                                        <div className="flex items-center gap-3">
                                            <PlayerAvatar player={p} size="10" />
                                            <div>
                                                <span className="font-bold text-lg">{p.name} {id === room.host && '👑'}</span>
                                                {p.score > 0 && <p className="text-xs font-mono text-neon-cyan">{p.score} pts</p>}
                                            </div>
                                        </div>
                                        {p.ready ? <span className="text-neon-cyan text-xs font-black tracking-wider bg-cyan-900/30 px-2 py-1 rounded shadow-inner">READY</span> : <span className="text-gray-500 text-xs font-bold tracking-wider">WAITING</span>}
                                    </div>
                                ))}
                            </div>
                            
                            <CanvasPFP room={room} user={user} />

                            <div className="mt-6 flex flex-col gap-2">
                                {!isHost ? (
                                    <button onClick={toggleReady} className={`w-full py-4 rounded-2xl font-bold text-xl transition-all active:scale-95 shadow-lg ${room.players[user.uid]?.ready ? 'bg-gray-700 text-white shadow-none' : 'bg-neon-cyan text-black hover:bg-cyan-400 shadow-neon-cyan/20'}`}>
                                        {room.players[user.uid]?.ready ? 'Unready' : 'Ready Up!'}
                                    </button>
                                ) : (
                                    <>
                                        <button onClick={startGame} disabled={players.length < 2} className="w-full py-4 rounded-2xl font-bold text-xl bg-neon-pink text-white hover:bg-pink-500 transition-all active:scale-95 disabled:opacity-50 disabled:active:scale-100 shadow-lg shadow-neon-pink/20">
                                            Start Game
                                        </button>
                                        <button onClick={resetScores} className="w-full py-3 rounded-xl font-bold text-sm bg-dark-surface border border-gray-600 text-gray-400 hover:text-white transition-colors">
                                            Reset All Scores
                                        </button>
                                    </>
                                )}
                            </div>
                            {isHost && players.length < 2 && <p className="text-center text-xs text-red-400 mt-3 font-medium animate-pulse">Requires at least 2 players to start.</p>}
                        </div>
                    </div>
                </div>
            );
        };

        const GameManager = ({ room, user, onLeave }) => {
            if (room.currentMode === 'song_king') return <SongKingGame room={room} user={user} onLeave={onLeave} />;
            if (room.currentMode === 'whatsapp') return <QuizGame room={room} user={user} onLeave={onLeave} isEmoji={false} />;
            if (room.currentMode === 'emoji_go') return <QuizGame room={room} user={user} onLeave={onLeave} isEmoji={true} />;
            if (room.currentMode === 'playlist_ring') return <PlaylistRingGame room={room} user={user} onLeave={onLeave} />;
            if (room.currentMode === 'chat_chain') return <ChatChainGame room={room} user={user} onLeave={onLeave} />;
            if (room.currentMode === 'chat_soundtrack') return <ChatSoundtrackGame room={room} user={user} onLeave={onLeave} />;
            if (room.currentMode === 'google_it') return <GoogleItGame room={room} user={user} onLeave={onLeave} />;
            return <div>Unknown mode</div>;
        };

        const ResultsScreen = ({ room, isHost }) => {
            const sortedPlayers = Object.entries(room.players).sort((a,b) => b[1].score - a[1].score);
            return (
                <div className="flex-1 flex flex-col items-center justify-center pb-12 mt-16 md:mt-0 animate-fade-in">
                    <div className="glass-panel p-8 md:p-12 rounded-3xl w-full max-w-lg text-center shadow-2xl border border-neon-yellow/30">
                        <h2 className="text-5xl md:text-6xl font-black mb-10 text-transparent bg-clip-text bg-gradient-to-r from-neon-pink to-neon-yellow pb-2">Standings</h2>
                        <div className="space-y-4 mb-10">
                            {sortedPlayers.map(([pId, p], idx) => (
                                <div key={pId} className={`flex items-center justify-between p-5 rounded-2xl border transition-transform hover:scale-105 ${idx === 0 ? 'bg-yellow-900/20 border-neon-yellow shadow-[0_0_20px_rgba(255,195,0,0.3)]' : 'bg-dark-surface border-gray-700'}`}>
                                    <div className="flex items-center gap-4">
                                        <span className={`text-3xl font-black ${idx === 0 ? 'text-neon-yellow' : 'text-gray-500'}`}>{idx === 0 ? '🏆' : `#${idx + 1}`}</span>
                                        <PlayerAvatar player={p} size="12" />
                                        <span className="font-bold text-xl">{p.name}</span>
                                    </div>
                                    <span className={`font-mono font-black text-3xl ${idx===0 ? 'text-neon-yellow' : 'text-neon-cyan'}`}>{p.score}</span>
                                </div>
                            ))}
                        </div>
                        {isHost ? (
                            <button onClick={() => getRoomRef(room.id).update({ state: 'LOBBY', gameData: {} })} className="w-full bg-dark-surface hover:bg-gray-800 border-2 border-gray-600 hover:border-gray-400 text-white font-bold py-4 rounded-xl transition-colors text-lg active:scale-95">Back to Lobby</button>
                        ) : (
                            <p className="text-gray-400 font-bold tracking-widest text-sm uppercase animate-pulse">Waiting for host...</p>
                        )}
                    </div>
                </div>
            );
        };

        // --- Mode 1: Song King (Spotify Vibe) ---
        const SongKingGame = ({ room, user }) => {
            const isHost = room.host === user.uid;
            const phase = room.gameData?.phase || 'SUBMIT';
            const guessTime = room.gameData?.settings?.guessTime || 60;
            const maciMode = room.gameData?.settings?.maciMode;
            
            const [search, setSearch] = React.useState('');
            const [results, setResults] = React.useState([]);
            const [selectedSong, setSelectedSong] = React.useState(null);
            const [myGuesses, setMyGuesses] = React.useState({});

            React.useEffect(() => {
                if (!isHost) return;
                const interval = setInterval(() => {
                    if (!room.gameData || room.gameData.transitioning) return;
                    const forceAdvance = room.gameData.forceAdvance;
                    const timeUp = forceAdvance || (!maciMode && room.gameData.deadline > 0 && Date.now() >= room.gameData.deadline);

                    if (room.gameData.phase === 'SUBMIT') {
                        const allSub = Object.keys(room.gameData.songs || {}).length === Object.keys(room.players).length;
                        if (allSub || timeUp) {
                            getRoomRef(room.id).update({ 'gameData.transitioning': true, 'gameData.forceAdvance': false });
                            setTimeout(() => getRoomRef(room.id).update({ 'gameData.phase': 'GUESSING', 'gameData.deadline': Date.now() + (guessTime * 1000), 'gameData.transitioning': false }), 1500);
                        }
                    } else if (room.gameData.phase === 'GUESSING') {
                        const allGuessed = Object.keys(room.gameData.guesses || {}).length === Object.keys(room.players).length;
                        if (allGuessed || timeUp) {
                            getRoomRef(room.id).update({ 'gameData.transitioning': true, 'gameData.forceAdvance': false });
                            setTimeout(() => {
                                let updates = { 'gameData.phase': 'RESULTS', 'gameData.deadline': Date.now() + 15000, 'gameData.transitioning': false };
                                Object.keys(room.players).forEach(pId => {
                                    let score = room.players[pId].score || 0;
                                    Object.entries(room.gameData.guesses?.[pId] || {}).forEach(([own, g]) => { if(own === g) score+=100; });
                                    updates[`players.${pId}.score`] = score;
                                });
                                getRoomRef(room.id).update(updates);
                            }, 1500);
                        }
                    } else if (room.gameData.phase === 'RESULTS' && (!maciMode && timeUp)) {
                        getRoomRef(room.id).update({ 'gameData.transitioning': true });
                        setTimeout(() => getRoomRef(room.id).update({ state: 'LOBBY', gameData: {} }), 1000);
                    }
                }, 1000);
                return () => clearInterval(interval);
            }, [room, isHost, guessTime, maciMode]);

            const searchItunes = async (query) => {
                if (!query) return;
                try { setResults((await(await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(query)}&entity=song&limit=5`)).json()).results); } catch (e) { }
            };

            if (phase === 'SUBMIT') {
                const hasSubmitted = !!room.gameData?.songs?.[user.uid];
                return (
                    <div className="flex-1 flex flex-col items-center mt-16 md:mt-0 pb-12 animate-fade-in">
                        <div className="bg-[#121212] p-8 rounded-3xl w-full max-w-2xl text-center shadow-xl border border-gray-800">
                            <h2 className="text-4xl font-bold mb-3 text-neon-green">Pick Your Track</h2>
                            <p className="text-gray-400 mb-8 text-lg">Select a song to represent your vibe.</p>
                            {!hasSubmitted ? (
                                <>
                                    <div className="flex gap-2 mb-6 bg-black p-2 rounded-2xl border border-gray-800"><input type="text" value={search} onChange={e=>setSearch(e.target.value)} onKeyDown={e=>e.key==='Enter'&&searchItunes(search)} placeholder="Search artists, songs..." className="flex-1 bg-transparent p-3 text-white focus:outline-none"/><button onClick={()=>searchItunes(search)} className="bg-neon-green text-black px-6 rounded-xl font-bold transition-transform active:scale-95">Search</button></div>
                                    <div className="space-y-3 mb-8 text-left max-h-72 overflow-y-auto hide-scrollbar">
                                        {results.map(t => (
                                            <div key={t.trackId} onClick={()=>setSelectedSong(t)} className={`flex items-center gap-4 p-4 rounded-2xl cursor-pointer border-2 transition-all ${selectedSong?.trackId===t.trackId?'border-neon-green bg-green-900/20':'border-transparent bg-[#181818] hover:bg-[#282828]'}`}>
                                                <img src={t.artworkUrl100} className="w-14 h-14 rounded-md shadow-md" />
                                                <div><p className="font-bold text-white">{t.trackName}</p><p className="text-sm text-gray-400">{t.artistName}</p></div>
                                            </div>
                                        ))}
                                    </div>
                                    <button onClick={()=>getRoomRef(room.id).update({ [`gameData.songs.${user.uid}`]: { id: selectedSong.trackId, title: selectedSong.trackName, artist: selectedSong.artistName, cover: selectedSong.artworkUrl100, preview: selectedSong.previewUrl } })} disabled={!selectedSong} className="w-full bg-neon-green text-black font-bold py-4 rounded-xl disabled:opacity-50 text-xl transition-transform active:scale-95 shadow-[0_0_15px_rgba(29,185,84,0.4)]">Lock In</button>
                                </>
                            ) : (<div className="py-16"><h3 className="text-3xl font-bold mb-4 text-white">Track Locked 🔒</h3><WaitingFor players={room.players} completedIds={Object.keys(room.gameData?.songs || {})} /></div>)}
                        </div>
                    </div>
                );
            }

            if (phase === 'GUESSING') {
                const songs = Object.entries(room.gameData.songs || {});
                const hasGuessed = !!room.gameData?.guesses?.[user.uid];
                return (
                    <div className="flex-1 flex flex-col h-full mt-16 md:mt-0 animate-fade-in">
                        <div className="text-center mb-6"><h2 className="text-4xl font-black text-white mb-2">The Mix</h2><p className="text-gray-400">Match the DJ to the track.</p></div>
                        {!hasGuessed ? (
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-5 w-full pb-32 px-2">
                                {songs.map(([ownerId, song]) => (
                                    <div key={ownerId} className="bg-[#181818] p-5 rounded-2xl flex items-center gap-5 border border-gray-800 hover:bg-[#282828] transition-colors">
                                        <div className="relative group shrink-0">
                                            <img src={song.cover} className="w-24 h-24 rounded-lg shadow-[0_4px_12px_rgba(0,0,0,0.5)]" />
                                            {song.preview && (<button className="absolute inset-0 bg-black/60 flex items-center justify-center opacity-0 group-hover:opacity-100 rounded-lg transition-opacity" onClick={() => { const a = new Audio(song.preview); a.volume=0.5; a.play(); }}><Icon name="Play" className="text-white" size={32}/></button>)}
                                        </div>
                                        <div className="flex-1 min-w-0">
                                            <p className="font-bold truncate text-xl mb-1 text-white">{song.title}</p>
                                            <p className="text-sm text-gray-400 truncate mb-3">{song.artist}</p>
                                            <select className="w-full bg-black border border-gray-700 rounded-lg p-3 font-bold text-white focus:border-neon-green focus:outline-none" value={myGuesses[ownerId]||''} onChange={e=>setMyGuesses(prev=>({...prev, [ownerId]: e.target.value}))}>
                                                <option value="" disabled>Select Player...</option>
                                                {Object.entries(room.players).map(([pId, p]) => <option key={pId} value={pId}>{p.name}</option>)}
                                            </select>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        ) : (<div className="flex-1 flex items-center justify-center pb-20"><div className="bg-[#181818] border border-gray-800 p-12 rounded-3xl text-center"><h3 className="text-3xl font-bold mb-4 text-white">Guesses Locked!</h3><WaitingFor players={room.players} completedIds={Object.keys(room.gameData?.guesses || {})} /></div></div>)}
                        {!hasGuessed && (<div className="fixed bottom-6 left-0 w-full flex justify-center px-4 z-50"><button onClick={()=>getRoomRef(room.id).update({[`gameData.guesses.${user.uid}`]: myGuesses})} disabled={Object.keys(myGuesses).length!==songs.length} className="w-full max-w-lg bg-neon-green text-black font-bold py-4 rounded-full disabled:opacity-0 text-xl shadow-[0_10px_40px_rgba(29,185,84,0.3)] transition-transform active:scale-95">Submit Guesses</button></div>)}
                    </div>
                );
            }
            if (phase === 'RESULTS') return <ResultsScreen room={room} isHost={isHost} />;
            return null;
        };

        // --- Mode 2 & 4: Whatsapp / Emoji Quiz Game (Chat Vibe) ---
        const QuizGame = ({ room, user, isEmoji }) => {
            const isHost = room.host === user.uid;
            const qIndex = room.gameData.currentQIndex || 0;
            const questions = room.gameData.questions || [];
            const currentQ = questions[qIndex];
            const phase = room.gameData.phase;
            const quizTime = room.gameData?.settings?.quizTime || 20;
            const maciMode = room.gameData?.settings?.maciMode;
            const hasAnswered = !!room.gameData?.answers?.[qIndex]?.[user.uid];

            React.useEffect(() => {
                if (!isHost) return;
                const interval = setInterval(() => {
                    if (!room.gameData || room.gameData.transitioning) return;
                    const forceAdvance = room.gameData.forceAdvance;
                    const timeUp = forceAdvance || (!maciMode && room.gameData.deadline > 0 && Date.now() >= room.gameData.deadline);
                    const cIdx = room.gameData.currentQIndex || 0;

                    if (room.gameData.phase === 'QUESTION') {
                        const allAns = Object.keys(room.gameData.answers?.[cIdx] || {}).length === Object.keys(room.players).length;
                        if (allAns || timeUp) {
                            getRoomRef(room.id).update({ 'gameData.transitioning': true, 'gameData.forceAdvance': false });
                            setTimeout(() => {
                                let updates = { 'gameData.phase': 'REVEAL', 'gameData.deadline': Date.now() + 10000, 'gameData.transitioning': false };
                                Object.entries(room.gameData.answers?.[cIdx] || {}).forEach(([pId, ans]) => {
                                    if (ans === currentQ.correctAnswer) updates[`players.${pId}.score`] = (room.players[pId].score || 0) + 100;
                                });
                                getRoomRef(room.id).update(updates);
                            }, 1000);
                        }
                    } else if (room.gameData.phase === 'REVEAL' && (timeUp || maciMode || forceAdvance)) { 
                        getRoomRef(room.id).update({ 'gameData.transitioning': true, 'gameData.forceAdvance': false });
                        setTimeout(() => {
                            let updates = { 'gameData.transitioning': false };
                            if (cIdx + 1 < questions.length) {
                                updates['gameData.currentQIndex'] = cIdx + 1; updates['gameData.phase'] = 'QUESTION'; updates['gameData.deadline'] = Date.now() + (quizTime * 1000);
                            } else {
                                updates['gameData.phase'] = 'RESULTS'; updates['gameData.deadline'] = Date.now() + 45000;
                            }
                            getRoomRef(room.id).update(updates);
                        }, maciMode && !forceAdvance ? 8000 : 1000);
                    } else if (room.gameData.phase === 'RESULTS' && (!maciMode && timeUp)) {
                        getRoomRef(room.id).update({ 'gameData.transitioning': true });
                        setTimeout(() => getRoomRef(room.id).update({ state: 'LOBBY', gameData: {} }), 1000);
                    }
                }, 1000);
                return () => clearInterval(interval);
            }, [room, isHost, quizTime, maciMode]);

            if (!currentQ) return <div className="text-center mt-20 text-xl font-bold animate-pulse">Loading Question...</div>;

            if (phase === 'QUESTION') {
                return (
                    <div className="flex-1 flex flex-col items-center pt-20 md:pt-16 pb-12 animate-fade-in w-full">
                        <div className="w-full max-w-2xl">
                            <div className="flex justify-between items-end mb-6 px-2"><div><span className="text-gray-400 font-bold text-sm uppercase tracking-widest block mb-1">Round {qIndex + 1}/{questions.length}</span></div></div>
                            <div className={`bg-wa-bg p-8 md:p-12 rounded-3xl mb-8 shadow-xl border border-gray-800 relative overflow-hidden flex flex-col items-center`}>
                                <div className="absolute inset-0 opacity-[0.03] pointer-events-none" style={{ backgroundImage: 'url("https://www.transparenttextures.com/patterns/cubes.png")' }}></div>
                                <div className="relative z-10 w-full">
                                    {isEmoji ? (
                                        <div className="text-center"><p className="text-gray-400 uppercase tracking-widest font-bold mb-6 text-sm">Who uses this emoji the most?</p><p className="text-[120px] filter drop-shadow-lg animate-bounce-slow leading-none">{currentQ.emoji}</p></div>
                                    ) : currentQ.type === 'who_said' ? (
                                        <div className="flex flex-col items-start w-full">
                                            <p className="text-gray-400 uppercase tracking-widest font-bold mb-4 text-xs">Who sent this message?</p>
                                            <div className="chat-bubble chat-bubble-recv bg-wa-recv p-4 md:p-5 rounded-2xl rounded-tl-none shadow-md w-fit max-w-[90%]">
                                                <p className="text-2xl md:text-3xl font-medium leading-snug text-white">{currentQ.text.replace(/"/g, '')}</p>
                                            </div>
                                        </div>
                                    ) : (
                                        <div className="flex flex-col items-start w-full space-y-4">
                                            <p className="text-gray-400 uppercase tracking-widest font-bold mb-2 text-xs">Fill in the blank context</p>
                                            {currentQ.context.split('\n\n').map((line, i) => {
                                                const parts = line.split(': "');
                                                const sender = parts[0];
                                                const text = parts[1] ? parts[1].slice(0, -1) : '...';
                                                const isTarget = i === 1;
                                                return (
                                                    <div key={i} className={`chat-bubble p-4 md:p-5 rounded-2xl shadow-md w-fit max-w-[90%] flex flex-col ${isTarget ? 'chat-bubble-sent bg-wa-sent rounded-tr-none self-end border border-neon-yellow/30' : 'chat-bubble-recv bg-wa-recv rounded-tl-none self-start'}`}>
                                                        <span className={`text-xs font-bold mb-1 ${isTarget ? 'text-green-200' : 'text-gray-400'}`}>{sender}</span>
                                                        <p className={`text-xl md:text-2xl ${isTarget ? 'text-neon-yellow font-bold animate-pulse' : 'text-gray-100'}`}>{text}</p>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    )}
                                </div>
                            </div>
                            {!hasAnswered ? (
                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                    {currentQ.options.map((opt, i) => <button key={i} onClick={()=>getRoomRef(room.id).update({ [`gameData.answers.${qIndex}.${user.uid}`]: opt })} className={`bg-dark-surface hover:bg-gray-800 border border-gray-700 p-6 rounded-2xl text-center font-bold text-xl transition-all active:scale-95 shadow-md ${isEmoji ? 'hover:border-neon-yellow hover:text-neon-yellow' : 'hover:border-[#00a884] hover:text-[#00a884]'}`}>{opt}</button>)}
                                </div>
                            ) : (<div className="text-center p-10 bg-dark-surface rounded-3xl border border-gray-700 shadow-xl"><h3 className="text-2xl font-black mb-2 text-white">Answer Locked 🔒</h3><WaitingFor players={room.players} completedIds={Object.keys(room.gameData?.answers?.[qIndex] || {})} /></div>)}
                        </div>
                    </div>
                );
            }

            if (phase === 'REVEAL') {
                const answers = room.gameData.answers?.[qIndex] || {};
                return (
                    <div className="flex-1 flex flex-col items-center pt-20 md:pt-16 pb-12 animate-fade-in w-full">
                        <div className="w-full max-w-3xl glass-panel p-8 rounded-3xl text-center shadow-2xl">
                            <h2 className="text-3xl font-black text-white mb-6">Round {qIndex + 1} Results</h2>
                            <p className="text-gray-400 mb-2 font-bold uppercase tracking-widest text-sm">The correct answer was:</p>
                            <div className="bg-[#005c4b] border-2 border-[#00a884] p-6 rounded-2xl shadow-lg mb-10 max-w-fit mx-auto chat-bubble chat-bubble-sent rounded-tr-none">
                                <p className="text-3xl md:text-4xl font-bold text-white leading-snug">{currentQ.correctAnswer}</p>
                            </div>
                            <div className="space-y-3 text-left max-w-md mx-auto">
                                {Object.entries(room.players).map(([pId, p]) => {
                                    const pAns = answers[pId];
                                    const isCorrect = pAns === currentQ.correctAnswer;
                                    return (
                                        <div key={pId} className={`p-4 rounded-xl flex justify-between items-center border ${isCorrect ? 'border-green-500/50 bg-green-900/20' : 'border-red-500/30 bg-red-900/10'}`}>
                                            <div className="flex items-center gap-3"><PlayerAvatar player={p} size="8"/><span className="font-bold text-white">{p.name}</span></div>
                                            <span className={`italic font-bold text-right truncate max-w-[150px] ${isCorrect ? 'text-green-400' : 'text-red-400'}`}>{pAns ? `"${pAns}"` : 'Skipped'}</span>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    </div>
                );
            }

            if (phase === 'RESULTS') {
                const sortedPlayers = Object.entries(room.players).sort((a,b) => b[1].score - a[1].score);
                return (
                    <div className="flex-1 flex flex-col items-center pt-16 pb-12 animate-fade-in w-full">
                        <div className="w-full max-w-4xl glass-panel p-8 rounded-3xl">
                            <div className="flex justify-between items-center mb-10">
                                <h2 className="text-4xl md:text-5xl font-black text-white">Game Over</h2>
